  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0489_WYG_007-1a, image: WYG1206/WYG1206-0356c.png}
body:
  text: 惟實集卷七元劉鶚撰七言絶寄舊友張漢傑二首幾度思君欲白頭凄然常隱去年秋此心恨殺中􅍽水不向棲霞樓畔流雙鳳堂前日往來東坡池上幾徘徊遙知尊酒相逢處風雨凄涼半是苔九日峽江舟中秋風如此客辭家重理平生舊帽紗不是故山無白酒年年奔走負黄花仙茒風雨凌空一葉飛師生邂逅即天機山林小草知何限汝獨神仙得所依秋山圖石田荒盡豆苗稀素化為緇尚未歸不是此山無好景草心正欲報春暉清明有感花開如雨栁如烟風景雖奇節序遷兒女不知春漸晚隔牆猶自弄鞦韆楊花如雪紛紛不自持殷勤長藉好風吹莫欺此日飄零甚猶有為萍變化時城南飲歸無分騎驢趁早朝城南飲散雪初銷北風吹酒忽成醉夢裏行過第二橋題東山髙卧圖東山攜妓嬉遊日敢意胷存萬甲兵今日總戎真豎子徒耽歌舞誤蒼生寄士彦僉憲十絶城郭荒村處處同五羊樓觀倚晴空時平若建麒麟閣更畫何人第一功訓練精兵捷若神從渠百變日如雲向來諸葛今何似青眼髙歌獨望君世祖成宗德業深百年培植士如林登車攬轡平生志孝子忠臣萬古心情好雖親音問疎秋來眠食近何如因風敢致平安問謾折梅花當寄書緑章夜奏玉皇家八載奇勳信可誇待得九重丹詔下共君握手看梅花自别京華意惘然浮雲過眼十三年白頭太守成何事又促乗驄瘴海邊㑹稽山與白雲齊海濶誰憐雁過稀猶幸嶠南天氣暖免教遊子歎無衣更無錢可歎空囊杜老何從糴太倉共説羊城饒貯蓄山中尚有禹餘糧帝王曾此理薰絃尚覺遺音滿耳邊若使聞韶仍大嚼絶勝騎鶴更腰纒蕭蕭木葉落窮冬倦客翛然况味同珍重孤根如鐵石少須明日又東風題應瑒三入承明圖安車三度入承明七子詩應讓老成好是衣冠遺澤逺諸孫猶自負亷聲題聶侯所藏美人圖紈扇將題若有思芭蕉陰裏立多時精神飛度君王側不覺忘形下筆遲題坐睡圖劫塵不到華山雲岸幘披襟立樹根世事料應看不得何妨合眼且忘言贈琴士翁希疇二首唐虞世逺已堪憐况值干戈十八年民慍不知誰為解煩君共我理薰絃髙山流水幾知音靜聽君彈感慨深縱使鍾期如可鑄更從何地得黄金五王並馬圖春風並馬宛如仙夜雨淋鈴似可憐太息弟兄多若此更無能識九齡賢題栗侯所藏牡丹菊圖二首洗盡繁華賦楚騷秋風澹泊苦相遭沈香亭北多佳趣爭似柴桑栗里髙國色天香結習空寒英晚節竟誰同平生富貴渾忘卻宛似翛然國士風題胡彬所藏乃祖澹菴書藁後二首上書乞斬秦丞相海島生還已白顛尚幸老臣心似鐵平生風節愈蒼然曾拚一死爭三事思退如今又一秦書奏但知强國體似公忠義幾何人野史口號碑四十四首近城民砦十破九元戎束手末如何宜章軍馬雖無敵只恐來時風雨多彎頭又益湖南賊近郭時時虜掠人足食足兵無早計明年此際恐無人五百健兒乗鋭出十三个賊一時來行糧功賞俱烏有興盡翻然解賊囘好利善諛周亞父特皆收録作親臣憲君縱有春如海那得吹嘘及逺人已聞祇候升州判巡徼俄聞亦佐州英徳只今為外府官民多怨更多愁曾聞濯足折黥布供帳俄驚王者同豪傑尚須如此待况今不過小夫雄城中謾有逹喇罕城外仍多呼喇孩城外城中無可那生民憔悴轉堪哀何以齊桓成伯業為能專任管夷吾毁譽黒白今無辨後世誰烹阿大夫憂國憂君臣杜甫無聊無賴只吟詩當時一片心如血贏得千秋萬古知得財縱賊尋常事為報私讎或滅門我亦臨風長太息一家富貴百家寃水軍萬户嗟何益何者為軍何者船料想此時為此䇿權都歸已利都專羣兇冗擾心何一二帥參差意不同闗北翻傳消息好闗南河道幾時通蒙君號令明如日兵罕相違便斫頭孺子紛紛無足數濫叨功賞取封侯蒙君信是奇男子誓滅官陂老賊園嘗膽卧薪心獨苦惜無公是與公非直將民社同兒戲不蓄干戈不蓄兵軍馬不來無别䇿只催百姓急脩城賊兵欲向翁源洞糾合官陂來打韶此䇿若行誠可慮南雄唾手可能招遮留使者來文牒恃勢要君真可誅憲紀皇皇無示弱盛衰闗數不闗渠王師為體須持重主將猶須紀律明功業直須豪傑做如何貪鄙可論兵羣賊知無兵可恃邇來充斥遍西郊官陂忽聽兵雲合賴有元戎為解嘲墳墓俄驚俱發掘妻孥生死若雲浮憑誰乞我金千鎰自願提兵殄寇讎五鬼相纒何日了一官如水曷勝窮謾憑商賈供薪米亂石灘頭一夕空甑已破矣顧何益好把胸懷大展開天賦我才應有用千金散盡或重來摶沙儘力苦難合誰識同心利斷金白髮老臣腸欲斷忍看民社付浮沈北道只云張帥在憲君倚賴重如山那知世道如前險二使遭逢亂石灘水軍萬户新開府氣勢憑陵藹若雲又欲遣人求二使倉皇一夜竟無軍責人以禮翻成怨待只依稀恐失幾幾到兩難無處制是非莫較不如歸城南健兒亦英鋭惡若哮虎何崎崯昨日送船多戰死興言討賊亦寒心東村喪牛不滿百西村喪牛百有餘牛盡田荒民困苦爭趨刀劍去犁鋤解衣衣我食食我况兼别眼意尤親赤心効報翻成咎自笑書生太認真邇來比比都元帥聞此令人頗失驚顛倒羣雄固如此但愁識者反相輕俄聞二使俱遭縶九曲愁腸痛不禁卻憶今年正二月曾為傷虎故傷心料想衣裳俱剥盡幸憐肢體未傷殘愁心耿耿知無寐况值嚴冬夜苦寒生民困苦亦已極官府徵呼又逼人上下但知求富利不知總為賊驅民生民憔悴可痛哭無處告訴只顛狂更看消息還何似亦復東風到五羊七十已衰仍苦病自憐無力任驅馳明當告老乞骸骨孝子忠臣兩得之西江涸轍望君久朝廷倚君真如山北來軍馬已雲㑹好調元戎早出闗可憐仁化蒙君禮討賊晝夜多經營當時不爇官陂砦此際賊盜已臨城曾因犯律殺愛卒毎為養士揮千金闗南豪傑有如此太息誰人知苦心賊兵如入無人境村落多為失主民束手待看臺領破班超介子果何人可憐日蹙國百里昨日又破陂頭村啞子食荼徒自苦少陵欲哭又還吞監司待我真骨肉我敬監司如父兄縱使監司如可負敢欺明主負朝廷此來恨殺彎頭賊白晝蓮花峯上旗監前半夜閙到曉公然對面相陵欺兩月河流乾欲斷南雄消息了無聞苦無良䇿開道路時復北望瞻風雲老軍樵採供衣食官府饑寒痛逼之賊滿四郊無處採忍聞半日盡逃移連山縣尹吉文曾玉輝没於寇購得其妻髙麗娘子及子燕京驢為收骨殖資贈還郷莽莽愁雲度庾闗八千餘里到連山英雄有骨天應相得共妻兒一共還惟實集巻七
