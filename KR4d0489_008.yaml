body:
  text: 惟實集附録元故江西參政劉公挽詩序公諱鶚字楚奇世家吉之永豐為邑著姓公自幼篤學學既成遂遨遊四方覽名山大川以增其氣而博其趣其發為文辭沛然也掌教河南秩滿而歸建浮雲道院以居之學者稱浮雲先生纍遷祕書監祕書郎與虞文靖公揭文安公歐楚文公諸名士日相唱和其學益大進遷海門縣尹不赴改南雄路經歷政聲大著升翰林修撰階奉訓大夫以內艱去官至正十二年紅巾盜起東南諸郡望風瓦解朝廷思有以彌之以江州為江南西襟喉而自李黼之死民遭塗炭邑里蕭然非勞來安集無以為守禦計乃擢公江州路總管屯楊家湖兵威始振改瑞州路未赴尋升廣東廉訪副使至廣繕城池修甲兵聚糧餉勉勵將士調度百出而上下欣然賊屏迹不敢近遂奉命專守韶州十九年授中憲大夫廣東閫帥二十二年拜嘉議大夫江西行省參政越二年韶州蠻獠亂公分兵討捕之而贑寇乘間卒至時城中兵甚少而賊兵强盛公雖老而氣猶壯乃自將乘城命他將領兵出戰相拒凡一月公之幼子運亦戰死而援兵不至城遂陷公被執至贑賊幽之於慈雲寺時仲子述在焉公謂曰吾平生志氣在忠孝今不幸至此我死不瞑目矣作詩一首付述不食六日而卒享年七十有五於乎公起自儒生揚歷中外凡數十年而後受命邊閫膺國重任不幸而國祚日危王綱日弛公之才志謀略卒不及展而竟死於難豈非天耶雖然公之一死自足以暴白百世以愧夫叛亂之臣又何憾第當時修史者失之采録不得為公立傳以附元史忠義之次然嘗之廣道韶聞韶人云城陷時死者尚多不止公一人今其姓名皆泯滅無聞古今死節之士蓋莫不然書與不書不足校也今年冬公之曾孫振持公生時所謂詩文及元進士劉玉女所撰公墓志俾讀之既乂以諸賢所挽公詩辭屬為序故掇取公平生出處大略以冠其首且以備太史氏之闕庶幾讀者有所考也明永樂五年歲次丁亥十一月長至日纂修實録翰林修撰儒林郎兼右春坊右贊善同郡梁潛拜撰挽詩梁寅世謂廬陵有四忠如公死節更希逢周綱不振無鳴鳳漢祚難興失卧龍國少鼎彝鐫偉績墓存碑碣紀遺蹤石門淚眼憑虛望天柱浮雲見一峯鄧伯言白鷺青原鍾淑氣鳳凰芝草協禎祥朝廷有道需才傑嶺海無虞佐憲綱暫假風霜清瘴癘祇將忠孝感穹蒼歲寒共喜堅松柏世事那知變海桑慷慨捐軀探虎穴凄涼歸骨葬螺岡貞魂萬古留遺恨潛德千年有耿光許逺不忘唐社稷蘇卿猶著漢文章哀歌有盡愁無盡稍稍悲風起白楊韓夢臣先生竟長往後死復何為松柏齊年操文章間世資故家成隔絶吾道屬顛危憶昔恩江㑹相親頖水時神京果奇遇好爵久羈縻翰苑文衡重龍庭聖主知青襟當要路紫詔下天墀梗道官三載西江守一麾乘驄烏府出度嶺路車馳白璧元無玷丹衷誓不移臨薨書頌烈趺坐㸃頭噫行實昭文獻勳名入憲規忠魂天府眷廉譽宦途師義骨山靈護泉臺旅櫬悲憂天愁世墜拔劍撥年衰故友違投紵諸生阻泣歧定知少陵筆寫入八哀詩黃莊松標悴寒冬薤露晞朝陽人無金石固焉能得靈長吁嗟國楨士時艱滯南鄉鵩鳥止坐隅龍蛇迫年光一旦忽徂謝萬化同杳茫青藜閟烟彩玉節空雲翔寶館瑟久撤城闉舂不相故交致芻束弔客奠椒漿清名恆若存摛藻亦還芳千載永難晤揮淚情何傷兹晨舉丹旐祔葬歸丘岡丁國卿丹桂林中秀家藏天祿書清時膺茂選壯歲陟亨衢吏部才猷著詞林翰墨敷棘闈曾閲試薇省重賓儒再覩黃樓鶴雙飛葉縣鳧超騰瞻玉陛耿介映冰壺不謂清寧域翻為戰伐圗九江煩牧守五馬壯儲胥白羽輝遙應蒼生氣欲蘇西山期保障北闕降庭除冉冉妖氛逼皇皇使節驅心忘家室繫操凜雪霜俱涕雨洪都外英風碧海隅憲綱明要典軍事畫良謨切慕勳猷燦深懷寵渥殊忠旌宜炳煥直筆起荒蕪蘭玉芳聲逺鄉閭德望孤九亰不可作感激再嗚呼魯沂宇宙有斯人文章領縉紳中原悲短日嶺表泣孤臣旅櫬驚霏雪麻衣涴戰塵招魂歸故里隕淚獨傷神張希達官居清要志浮雲蚤歲才名聳縉紳司馬雄文能喻蜀魯連大義不尊秦兒童竹馬潯陽日使節梅花百粵春回首鄉枌清蔭少典型寧復見斯人趙敬一代英賢喪斯文哭巨公艱危當大任激烈負孤忠勳業哀時邁文章在世雄况餘烏府柏颯爽起悲風劉源苦志絶韋經吟情役宦情繡衣巡嶺表玉節况心明文喜時人識名從蚤歲成如何催作頌仙夢謝浮雲趙杞玉殿黃金榜烏臺白簡霜文章傳史筆人品重歐鄉八袠康寧福三千弟子行絶憐仙去日多士總神傷馬復初道隱贑江邊操忠鐵石堅存心明志節淚血寫詩篇易見長安日空瞻嶺嶠天臨風看手澤遺恨尚依然諸老風流盡先生尚紫宸報恩萬里道歸骨故山春文字傳千古簪纓啓後人交游半零落揮淚獨傷神黃琢青春來鳳闕白首謝龍墀聖主宵衣日孤臣抆淚時殉身惟道在憂國有天知千載東山下行人看石碑蕭紹宗一從幽致浮圖寺羽化翩然叩帝居為掃兵塵連否極故游神氣反元初儀容固覩歸靈櫬風采猶疑在使車事業文章終有紀應留珣筆為公書文允中廟堂彝鼎已銘勛三尺蓬蒿蔽古墳無復風流如此老孰知天意喪斯文遼城鶴語當斜日宰樹猿啼黯斷雲青史百年遺論在令人惆悵仰清芬段琇少年意氣動宸旒晚歲功名負海舟紫綬金章閒歲月青天白日照羇囚丹成不作崆峒住尸解真成汗漫遊公自逍遙人自戚西風黃葉不勝秋劉德俊暮年持節繡衣班經濟才名豈等閒誰想中原遭板蕩遂令南國際時艱神仙路逺來何晚天帝樓成去不還歸到歐鄉扶旅櫬霜風吹下淚潸潸蕭規蓬萊水淺劫灰飛嶺表孤臣白骨歸班固文章猶鼎盛張綱事業竟睽違書存天祿藜烟滅歌送邙山薤露晞獨覺詞林失根柢誰憐小子舊瞻依羅達館閣文章舊聲華冠士林柏臺恩澤厚梅嶠雪霜深遽作遊仙夢應輸報國心朔風丹旐逺客淚一沾襟吳汶文章垂世稿猶存齒德廬陵表達尊四品已堪榮晚節百身無復贖羈魂歸船淚溢章江水哀些聲傳憲使門盛德宛然猶可見森森蘭玉似春溫胡天全大父年過一百餘作詩曾寄逺遊孫歸來甘㫖能終養劉氏終為孝義門椿府森嚴教一經宦途由此立功名榮親追贈彭城伯富貴文章見死生解養慈親二室人彭城舊郡總封君非誇冬筍冰魚味紫誥同封世共尊芹宫職教列文臺講下諸生自逺來豈特菁莪成美頌至今楚些羡奇材作賓漕運及黃堂修撰文華動帝鄉歸把浮雲名道院詞臣黼黻永流芳元季干戈禍不輕李侯死節重江城朝廷遴選公來繼數載荒區集義兵再守筠陽謝國公柏臺作吏廣韶中少親民務多軍務白簡飛霜毒霧空一登帥府總戎時大厦將傾勢莫支香積厨邊饑不食自知死節是男兒如儀棺殮二郎賢兀兀靈輀送及泉天柱峯髙接雲漢想應號泣動旻天捐軀報國誓當年瘴海孤忠萬里天只恐史臣編不到老夫和淚寫新篇湖海翁天全臨卷傷悼寫成哀些十章挽者當為歌之張翥豈為先生慟深為世道哀衣冠人物盡鄉國棟梁摧疑事誰堪質頽風孰與回扁舟丹旐逺愁上鬱孤臺金幼孜揚歷躋通顯蜚聲獨擅場孤忠踰鐵石志節厲冰霜孫子瞻遺像鄉閭望耿光如公真不負百世有餘芳周孟簡文采先朝傑才名舉世尊赤心曾報國白首舊承恩化雨杏壇著清霜柏府聞金章垂紫綬繡錦炫朱門德業推前輩詩書綿後昆投簪期樂道絶筆竟修文已逐仙人似難招楚客魂泉臺秋月冷宰木晚雲屯碑刻千年古藝香一卷存天涯空憶處新淚長潮痕曾鼎宦遊早已擅英聲嶺海風霜屬老成烏府威名馳列郡虎符號令肅專城﨑嶇報主心常苦慷慨捐軀志未平千載廬陵忠節郡貞魂凜凜尚如生彭汝器東廣傳遺愛西江失老臣居官貧遺子守節晚留名歲應龍蛇讖山空猿鶴驚崆峒歸旅櫬丘首得佳城蕭鎡遊魂竟入鳳臺鄉地老天荒歎渺茫緑水青山迷道路白雲黃壤蓋文章功名分上無心願經史案頭有墨香恨到九亰應不瞑泉扃耿耿夜天長吳仲珠賊陷嶺南時城孤力不支甘心死有分唾面降為癡寧斷杲卿舌誓歸馬援尸佛堂留絶筆天地鬼神知劉虬夙昔才華動縉紳家為孝子國忠臣揮戈欲挽桑榆日持斧曾向南海春章水僧居悲過客故山道院隔浮雲平生樹立家聲逺潛德咸彰太史文胡廣蚤歲才華動紫宸誰知鳴鏑起風塵誓師諸葛空存漢裹革馬援豈愛身庾嶺梅花傳玉節萇𢎞碧血化青燐崆峒不挽浮雲住淚灑西風暗愴神周述嶺表孤城烽火秋勢危建節老臣留百蠻瘴癘旌旄暗萬國軍聲海氣浮學士文章光日月柏臺忠義老滄洲身經百戰寧辭死天地無情草木愁曾棨浮雲事業竟何之曠代奇人死亦奇志在山河危仗節心關天地愴留詩鼎湖龍去風波靜遼海鶴歸夜月遲父子雙忠銘竹帛綱常千載並扶持劉素嵩嶽千年間氣鍾久從學海景人龍雄文倒峽標章漢大節擎天上鼎鐘瘴海揮戈斜日返故山歸骨白雲封士林慟哭留詩史颯颯悲風起澗松朱縉中原遭板蕩嶺表尚風塵握節詔專閫安邊命老臣旌旄開瘴霧華彩動楓宸蘇武終歸漢魯連肯帝秦欲回滄海日不負雪霜身衰世悲鳴鳳斯文感泣麟浮雲送過客鷲水來歸人荒草凄墳土愁看淚滿巾裔孫希旦憲節昭垂萬古芳仰承忠義有餘光貞魂凜烈輝山嶽國祚潛移變海桑禴祀彌新靈儼在孝思長繫耿難忘年年展拜登丘壠颯颯悲風送夕陽裔孫希奭滄桑閲遍幾春秋哭望旌旗庾嶺頭南海誓師山嶽壯故鄉歸骨鬼神愁運移元祚知難復誓報君恩死未休一上荒塋風露冷凄凄寒月照松楸裔孫公熙運祚傾危勢莫支韶城戰守共幼兒拚將一死酬君國孰鑄雙忠上鼎彝灘水鳴號歸旅櫬詞林悽惻哭留詩孤墳三尺餘荒草淚灑西風百代悲裔孫冠傳家惟忠義世守耿難忘報國臣子志一死有何妨至今正氣烈耿耿日月光富貴浮雲視名節史冊香詩書遺我後凜凜存墨莊歲時展丘隴野日白荒荒裔孫士彥板蕩中原事已非老臣持節陷重圍戰深海月連烽火血灑陳雲上繡衣正氣儼同河嶽壯貞魂仍向北平飛白楊秋草凄墳土望斷南雲化鶴歸裔孫士章在昔元運終吾祖守韶雄六載軍威振稍稍集哀鴻那知烽火遍南北路不通孤城既少援兵盡糧又空賊勢愈猖獗屯聚若蟻蜂父子親督戰陳亡先運公韶城旋失陷被執過崆峒罵賊義不屈死與巡逺同我生世已後憑弔撫遺蹤一官仍苜蓿皋比坐從容感懷千載上正氣若霓虹河嶽與日星俯仰又奚窮裔孫可規七十人生古所稀我公仗節魯戈揮豈知元祚傾難復力掃中原志已違心戀闕廷無報效陳亡幼子失瞻依年年展拜登荒隴義魄遴隨三島歸張元鋭丹心常耿耿徑節晚蒼蒼楊僕專征伐蠻江起戰場孤臣頭可斷千載骨猶香往事誰堪擬睢陽與晉陽朱玉朗五嶺烽烟天柱折英雄喪去灘嗚咽蠻江風雨夜猿啼光嶽千年正氣烈蚤歲才華入承明一麾出守建奇節生死不負元社稷罵賊寧斷杲卿舌公有幼子先陳亡雙忠銘鼎真人傑勿道史臣編不到精靈貫日中天揭聶大綬富貴浮名何足數惟有節義光千古骨化形銷聲不磨地老天荒心獨苦先生壯歲入承明晚向嶺嶠建開府韶石雲擾曲江翻邑屋蕭條無淨土睢陽羅雀力已窮越石重圍身無主邪許莫呼神鬼愁西南地陷終難補祇有一死報君恩信國先後堪繩武人生死所最難得英風不共草木腐父子雙忠事真奇綱常千載擎天柱寶氣埋光四百年眢井函書聲華吐劫盡灰飛此集傳都是萇𢎞碧血聚蔣璟吉郡素稱節義邦文忠表表擅歐鄉宋朝養士三百年信國誓師起勤王正氣一歌天地老千秋廟祀螺山岡大元忠義劉大參父子仕元守廣南嶺海强寇蜂蟻集嗟哉國步際艱難運移元祚難恢復一天風雨殘兵哭公之幼子出陳亡報國忠君義不辱崆峒山髙落日低孤臣誓死甘如飴我來憑弔鬱孤臺西風灑淚誦公詩解以敬瘴雨蠻風海國愁孤臣專閫幾春秋波翻盧水天難問身死浮圖恨未休越石晉陽心力竭文山柴市姓名留忠魂靈氣之何所長向九成臺上遊鍾維楨嶺表驅馳擁節旌樓船楊僕自專征運移元祚時難挽風起曲江浪不平取義成仁行所學勒鐘鐫鼎得其名浩然正氣今猶在龍石山髙恩水清程衛嶺海有雄關鎖鑰控百蠻瘴烟連粵海世危防禦難劉公建奇節仕元朝命頒授公廉訪使移師鎮韶南强寇不敢犯號令嚴如山令子元帥府分兵守其間百戰先陳亡報國誠無慙兵盡孤城陷罵賊杲卿顔囚公義不屈誓死性所甘慈雲題絶筆撫事淚潸潸雙忠垂竹帛勳名日月攀劉士晉近讀忠臣編先生父子傳文章輝柏府勳業著南天血戰沙場月魂飛瘴海煙一門全大節千古仰名賢宋上達百歲有時盡芳名萬古揚山河撑正氣金石煥文章戰死風雲暗遺詩日月光雙忠垂竹帛奕代肅蒸嘗程謀道元代有禎祥如公應屈起讀祕膺雄藩心猶江漢水戰賊苦無援可憐失幼子被執奈何天不食豈得已大夢落江山烈心疑未死堪作懦夫程還令奴顔恥節義顯文章馨香百世美素位合中庸汗簡千秋紀張允沆炎方作鎮髮星星海國波騰似濁涇祇以死生扶社稷長留氣節塞蒼冥于今俎豆新崇祀有子忠勳共勒銘身去名存青史在千秋憑弔讀遺經湯道生取義成仁浩氣雄英風凜凜壯寰中精神不逐烟雲去忠節能令天地通獨力支撐天下事寸心特表聖人衷慈雲寺裏靈猶在化作啼鵑帶血紅謝可法先生真取義殺身亦奇哉七尺爭天地孤軍耀斗台丹衷貫皎日正氣塞塵垓凜凜雙忠在狂瀾砥柱回湯楨大地茫茫四百秋如公事業孰堪儔專征嶺表同楊僕力掃中原頡武侯死義虔南堅晚節葬歸天柱冷荒丘芳名終得垂青史檢讀遺詩神鬼愁陳之麟蠻江毒霧暗風塵仗節韶城誓殺身百戰孤軍寧論命千秋大義只成仁臨戎巾服真儒者貫日丹衷表老臣若到浮圖尋絶筆士林悽惻恐傷神張允淇瘴霧蔽天海國墟孤臣不惜老頭顱慈雲寺裏題紅血天柱峯前駕素車豈為令名光汗簡但還浩氣與太虛騷人欲寫平生志只在浮雲一句書劉芳漢乾坤板蕩抱懷孤每話紅巾淚日枯符節嶺南制專閫安邊韶粵仰名儒旌麾瘴癘百蠻逐氣肅風雲萬國娛古道廬陵忠節郡增光俎豆不能無李向旦戎寇紛紛亂南土可憐忠義死干櫓人間鐵石作心腸天上銀河洗肺腑只說疆場難未平誰云家國空無補文山正氣滿乾坤父子如公堪步武裔孫于廷積思不可極日向紀編尋象郡見奇節羊城留憤吟凜然顔杲舌烈矣比干心幸表雙忠藎歐文共古今裔孫天受粵海詔分閫神州遽陸沈酬恩三尺劍許國一生心青史芳名古孝思歲月深聖朝旌典在廟祀到而今裔孫剛烟雨凋殘數百秋精忠耿耿孰相儔惟存社稷堅生敵不脫干戈誓死休疏上皇廷光簡冊事宜益師兩疏詩遺佛寺壯山丘贑州府慈雲寺於今聖主褒忠節俎豆增榮繼宋歐附弔楚奇公子忠節尊元公大元雙節義正氣逼塵埃庾嶺狂瀾挽蠻江砥柱回文章昭萬古勳業炳三台髙壟瘞靈爽芊芊草木哀戊申暮春懷元忠節楚奇公浮雲書院遺迹浮雲址畔草離離極目蕭條獨鎖眉古樹淡烟殘夜月落花疏雨暮春時蛙聲疉疉添新恨烏影紛紛起舊思更向坡前閒悵望水流山繞不勝悲元故中順大夫海北廣東道肅政廉訪副使劉公墓志銘公諱鶚字楚奇世為吉永豐顯親里人曾祖思才祖士表壽百三歲父天祐皆隱德弗耀公幼穎悟知勤學稍進益能求師初學聲律科興習舉業屢試不第尤專意詩文有英俊聲年弱冠出遊四方時大父年九十有五寄詩曰不知孫去身何地深慮舟行浪拍天公得詩即歸省因念祖若父皆髙年不復出皇慶壬子遊淮東宣慰通通聞其賢舉充揚州儒學録泰定乙丑受汴省檄掌教齊安河南三書院新書院以立教麟州龍先生撰碑文郡守房公明德刻於石考滿歸建浮雲道院為臧修之所學士虞公題詩曰浮雲何處來與天為文章揭文安公記之承㫖歐陽𤣥賦之天厯己巳改授泰州儒學教授未赴京師庶府交辟初掾繕工司繼掾太醫院以才幹稱至元丙子授將仕佐郎京畿漕運司照磨京漕三百萬出納重繁前任是職者鮮終公一無所私抗貪吏都運赫格盡革舊弊以廉能著秩滿至正元年擢從仕郎湖廣儒學副提舉時學田若干畝為有力者所據垂三十年而不能復前任是職者往往不敢舉正公至首建言省憲以身任之盡復其田居未幾擢祕書監祕書郎日覲清光與虞文靖公揭文安公承㫖歐陽元公中書左丞許有壬諸先生往還唱和四年轉承事郎海門縣尹未赴六年遷承直郎南雄路經歷南雄當道廣要途送迎供億不勞民而給贊襄平恕政譽藹然十年升翰林修撰奉訓大夫丁內艱家居十二年壬辰紅巾盜起州郡望風瓦解六月朝廷遴選守令超試江州路總管江州丞李侯黼死節後荆棘莽然十五年乃屯楊家湖日畫䇿為恢復計兵威甚張於是寇不敢犯者凡三年十六年正月改除奉議大夫瑞州路總管未赴十七年九月升中順大夫廉訪副使十八年戊戌二月命始下公去楊家湖道隆興適營國公和尼齊自瑞州回省留公議城守公以君命不敢違四月登舟赴廣東憲副任五月公持節度關六月朔日開司南雄九月駐車於韶調度無虛日十九年春二月至廣東欽受宣命入司禮上夏五月分司募兵屯韶修城池繕兵甲勉勵將士恢辦軍儲奉命守韶二十年九月授中憲大夫廣東閫帥二十二年二月拜嘉議大夫江西參政凡六年寇至屢擊卻之民賴以寧二十四年甲辰九月韶洞獠作亂公分兵討之而贑寇乘間猝至公自將乘城命軍將李如璋率兵力戰一月餘竟以兵少無援而城陷公被執拘囚至贑賊將義公所為幽於慈雲寺惟仲子述侍側公曰吾平生志在忠孝不幸遇執不能報國死不瞑目公書曰生為元朝臣死作元朝鬼忠節既無慙清風自千古公不食六日而卒時十月二十日庚戌也嗚呼公以文學際遇明時躋膴仕膺顯名以行所志及遭世亂備嘗艱險而報國之心死而不渝斯可謂始終克全矣公生至元庚寅七月六日享年七十有五學者宗之稱為浮雲先生其文章有惟實集若干卷傳於世公性孝友事祖父母父母竭其誠撫弟姪慈而義待宗族以睦接鄉人以恩見世姻子弟輒勸之學由公而成材者甚衆從伯父季雲得疾體虛憊其子貧公捐資為制剛劑服三日愈後以他疾終公具衾棺以葬宗黨義之邑黃文明等死於燕無所歸公能殯之吉文蘭溪曾氏子燕京驢隨侍父玉輝宦連山其父沒於寇母子流落公重購求得之以歸公於親友無不盡其情嘗捐資鑿石築陂溉田凡力可為者知無不為父天祐贈中順大夫禮部侍郎上騎都尉彭城郡伯母黃氏贈彭城郡君妻戴氏贈彭城郡君繼鄧氏封同上子男四遂育兄鼎翁子冀州儒學正述國學上舍進為第一翁後早卒運繼之侍公於韶以出戰死女一壻臨川饒伯振孫男六昌符昌裔昌復昌餘昌壽昌泰女三曾孫男一廣孫女二明年乙已遂述奉公柩歸自贑十二月二十癸酉葬吉水仁壽鄉東山天柱峯之原公所自卜也先葬徵豫志豫於公為母姻家豫少公五歲自童稚為兄弟長以斯文見厚如同氣至老常相聞也宜為志銘曰其問學該乎六經其行實貫乎日星覩絶筆之數語表忠義於平生前鄉貢進士吉安路永新州儒學正劉玉女撰前鄉貢進士吉安路泰和州儒學正劉于書丹豫章田貴卿鐫石銘余讀書山中觀揭文安公浮雲道院記已知劉公為名士暨擢第入翰林時楚奇在祕監木天玉署相密邇每出入必相見楚奇佐郡南雄值壬辰兵變不相聞知歲癸已江西貢士上春官始知楚奇動靜廷論奏為修撰改江州守廣東憲赫赫在人耳目噫以楚奇文行之美何施不可乃邅回嶺海以終亦可哀為之詞曰恩江之山兮崢嶸恩江之水兮泓澄久鬱積兮磅礴孕奇秀兮士挺生猗先生兮人中之傑泛學海兮士林之英朝發軔兮泮宫夕弭節兮蓬瀛典中祕兮木天陪顧問兮彤庭或分符兮統郡或攬轡兮澄清聲華溢兮藩府名姓列于御屏咸期公兮還朝將贊化兮鈞衡倐龍蛇兮起陸紛豺虎兮縱橫悵關河兮修阻獨持斧兮南征鯨鯢奮兮瘴江沸頽波激兮砥柱傾望故鄉兮邈悠聊羈棲兮贑城嗟舍生兮取義庶不負於忠貞前進士渝陽胡行簡泣銘大參公遺像贊鶴立昂昂令聞孔彰不知者謂公為埋輪之張綱知公者指公為罵賊之睢陽公雖沒矣如公未亡炯炯丹心至今耿光先生平生歷仕顯要早繇南雄經歷升翰林修撰晚自九江筠陽郡守二憲東廣守韶城遷閫帥拜嘉議大夫江西行省參政紅巾之亂韶城陷公不屈忿悶六日不食而卒距今二十餘年矣公之仲子述以公之遺像及絶筆示豫僭書四十六字以表公之志節云洪武乙丑二月望日前進士安陸州通判同里劉虬書又貌肅而莊行峻而潔其學問動乎縉紳其聲光振乎閥閲其才華足以司帝制其風裁足以持憲節此所以當崎嶇末路之際而能奮忠義之遺烈也歟公之孫希旦以明經領江西鄉薦㑹試禮部乃以公之遺像謁豫請言嗟夫豫何足以知公雖竭其鄙鈍亦豈能知公之萬一哉希旦於此惓惓焉請之益勤且切可不謂劉氏之賢𦙍乎而亦可觀公之世澤矣遂為之贊而併識其後云永樂五年丁亥冬十一月長至日賜進士及第翰林侍講同邑曾棨書劉楚奇先生贊蔣璟捧讀惟實儼然劉公篤志聖賢幼學壯行經濟纍纍德業轟轟被執不咽甘作元靈烈烈忠魂千秋炳炳忠哉忠哉如日在天節歟節歟重若泰山剛峯之友椒山之前血食崇祀億萬斯年附劉尊元先生贊令子元帥力能禦寇奮不顧身戰死陳頭英節皎皎忠孝縷縷父子香骨億萬春秋追祀加贈永昌厥後楚奇公遺像贊裔孫剛其學博其才長其歷仕也顯其操節也剛炳炳風烈何慚常山與睢陽世世廟享不減歐文與忠襄丹青繪來精仍燦祇覺一生正氣挾風霜附尊元公遺像贊惟公克循父志世篤忠貞衝鋒陷陳義振軍聲粉身碎骨光耀日晶想當初勇冠雄嶺昭昭乎事君如事親到今日俎豆配享尺幅上仍是血性天真豫小子愾乎聞僾乎見敢不祇承明禋豫因舊像朽蠧乃請丹青重繪二公遺容以啓後人景仰不忘之意公之父子生元仕元而死節於元雙忠耿耿鴻儒碩士久矣為公表揚奚待豫小子之蟲吟唧唧始發其幽光然而鄉賢崇祀至數百載必待豫小子請於當事始得從事夫蒸嘗瞻拜遺像凜凜焉願公俎豆長發其祥惟實集附録
