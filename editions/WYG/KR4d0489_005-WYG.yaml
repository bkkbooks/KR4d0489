body:
  text: 惟實集卷五元劉鶚撰五言律勉學者文學登名日青雲發軔初慎母輕作吏亦足取亨衢得意宜思効功成更讀書異時横浦上爛爛夜明珠早發陽城疾赴軍壘風雪失路因記其苦二首虚名不直死何事苦紛紛曠野惟空壘長途只斷雲日斜心更恐風急耳多聞未用輕衰颯狂歌一張軍生死不須念羸驂當疾驅悔來無及事到此欲何如有友堪同命無人可寄書忽看氊帳近魂魄暫時甦次韻有客慚毛遂何人薦馬周霜枮銅雀硯風冷木緜裘徐孺無懸榻元龍不築樓好將閒歳月乗興覓糟丘為武寛則賦湖山結屋紅塵外何人可得羣髙情洞庭水逸興九疑雲漁唱江花晚樵歸野興曛是中最佳處涼月夜紛紛送詩僧澤天全歸天竺淵深知有本純一更無機偶共浮雲出還同明月歸草生頻入夢花落不沾衣天竺山前路蒼苔雨欲微京師㑹維揚舊友次韻以謝宵殘明月老不復少年心最惜平山栁今無一樹陰雷塘春水滿海鶴暮雲深無限傷心事因君發浩吟鄉人楊用甫成家於彼載酒相勸因書鄉語耳邊熟聞之喜入神誰知窮域外亦有故鄉人兒女皆椎髻鄉閭自睦婣一樽邀共酌尚覺此情真清逺峽峽束山如鬬江灣路漸囘可憐人化外謾説寺飛來殿圯風鳴樹廊虚雨濕苔漢蘇那可作忍聽暮猿哀髙榮祿築南城别墅蒼松老柏異花時果蔚然成林公與夫人乗小車攜二孫來往其間徵余賦遂次杜公何將軍山林十首云村迥疑無路堤平不復橋暖風開芍藥細雨落凌霄自得幽居趣何煩隱者招小車來往熟乗興不知遙漸與紅塵逺應便野興清緑楊閒放鶴芳草坐聞鶯園果隨時摘畦蔬取意羮青山時徙倚如在畫圖行田許羣童種糧堪一歳支鷄豚同里社鵞鴨自陂池已分身終隱何憂世莫知急流中早退寧遣歎紛披接屋青青栁當軒灼灼花矮屏開錦繡喬木舞龍蛇深澗雲堪煮清宵月可賒一時幽興極步屧過鄰家書帙攜孫讀尊罍待客開閒心雲外鶴髙興雪邊梅野老時相看沙鷗亦復來絶憐老松柏清影蔭莓苔穿樹通山色澆畦汲井泉魚肥堪膾炙蠶熟得絲緜怪石粘枯蘚圓荷貼小錢便令金北斗寧換此山川自從辭禁闥不復夢含香地僻塵機息心清六月涼烟霞供笑傲琴鶴共行藏所喜身長健從教鬢髮蒼百年半風雨五世此臺池陰滿蒲萄架春浮木槿籬持家還有婦繼志豈無兒身外憂何事惟教酒榼隨對客歌金縷家兒愛慶雲茂陵須病渴太守尚能文雲映山光近烟開栁色分無邊閒富貴餘子苦紛紛宦海久無迹風霜將奈何起看天尺五敢謂地無多往事誰能憶髙情自可歌年年當此日載酒一相過龍虎臺肅駕俯仰城空是凄涼事已非虚傳天仗至不見祖龍歸地迥風霜慘雲深日月微髙堂一惆悵弱淚不勝揮十月十四日崇天門聽詔有喜二首聽罷龍飛詔揚休萬口俱公忠賴伊霍揖讓見唐虞禮樂開平治衣冠協贊謨祖宗遺澤在千載鞏皇圖義理推明易君臣慶㑹難乾坤歸厯數社稷重丘山天意舒晴霽人心溢喜歡客愁渾為解驢背永歌還哭饒上溪霜蹄驚再蹶緑鬢忽華顛國子諸生集膏肓二豎纏死生人有命京洛客無氊歸骨知何日思君苦淚懸致和參議吳彦洪天厯龍飛以罪貶既行薄俗欲求君夫人孔氏為室家孔聞之即自刎流血被面誓死不辱或聞而止越四年詔雪君罪且徵南還遂與夫人相見如初嗚呼視彼一易節不見答於良人者槩可感矣夫婦天倫重翻雲世變深秋霜持素節頸血見丹心嶺外梅花瘦閨中月影沈歸來情更苦喜極重沾襟秋晚溪上忽忽年華度茫茫野水流西風楊栁雨殘照菊花秋萬事蕉中鹿浮雲海上鷗功名遂意好何處有扁舟月夜思家清夜思家立中庭片月流惟憂故園菊還似昔年秋為口長憐鴈知機獨愧鷗明年二三月烟水五湖舟送孔與之赴樂安尉二首祖帳東門道青山得意歸山城花泛泛客路栁依依地僻經過少世平警邏稀有詩頻寄逺雲憶别時飛行旅清晨發柴扉過夜扃桑麻隨地緑蒼蘚上階青威武存三畧詞華本六經聖門家法在隨意憶過庭過髙氏十里莊乗風髙栁下捫虱老松林濁酒陶真趣清泉洗此心晚花偏有態落日故多陰揭厲宜深淺行藏自酌斟宿陽城時臘月九日辱和尚司鄉訪還因賦但知為久住何用即能歸客子亦良苦官曹如此稀繁霜吹老鬢斜日照征衣歳晚鄉心切長途恨不飛題甯戚叩角圖月色夜轇轕開門溪水明天機閒始得詩思靜還生栁影臨流活鐘聲傍夜清頻醒塵土夢飛步欲登瀛居庸闗形勢自雄壯古來畨漢分千年有今日四海喜同雲木落樓臺出山深雞犬聞危闌閒立馬壯氣掃千軍倪行簡由伴讀除江陵教授譚𤣥之集賢掾除南雄經歴命既下二公皆死於道聞之有感南風久不競天豈薄斯文宦轍方云逺哀音遽忍聞秋空殘葉露夜月斷鴻雲苦淚無從洒題詩獨弔君哭友兄陳養志二首用世有逺志讀書多苦心花殘偏值雨雲薄不成霖翰墨風流盡興亡感慨深池邊老松樹無復共長吟講習常同席間闗共出山青霄鶴背穩白晝錦衣還鵰鶚思騰漢芝蘭竟化管知君有遺恨重我淚潸潸夜坐有感四首稍稍月當户蕭蕭風滿林夜寒香夢逺霜重漏聲沈孝子終身淚忠臣到死心承平春似海豈料有如今禍福當求已行藏欲問天干戈今更盛塗炭愈堪憐痛恨儲胥缺何由郡國圓恨無雙羽翼飛訴至尊前禮樂將興日干戈獨盛時聖躬無失德天道苦難知嗟爾民何負甘心賊忍為不平徒怏怏推枕起裁詩大厦將傾日徒勞一木擎揆時難與禍避位敢忘君無術能平寇持威謾張軍中宵時念此老氣欲干雲報獲寇首方建優陞議旋收斬馘功老夫殊矍鑠諸將盡英雄麾下人如虎行間馬似龍渠魁今就戮鄰寇勢應窮題王棣詩卷後白鷺從師日髙涼發軔時正當供子職勿負故人期志在青雲逺心清白日遲少年宜努力勉汝强題詩十二月桃花盛開有感賦之梅花猶在樹桃蘂已盈枝嶺外驚春早江南得暖遲好風吹錦繡細雨濕胭脂前度劉郎老無心為賦詩寄雄州監郡既往那容咎方來尚可追好將功折過直以勇忘私董卓誠堪鄙張巡豈是癡憑君當靜夜仰屋試深思寄雄州太守譚元凱幸際風雲㑹青雲縱靶初山川融間氣父子並司徒勲業千年在金珠過眼虚期君師卜式庶可遂良圖題王志亮元帥草菴中原方致力那復以家為結草聊為屋編花謾作籬招降多善䇿横槊有新詩文武才全備王孫自一奇曾惟吉所藏楊宗瑞贈其師張仲儒卷諸老風流盡遺經孰與論攜持文墨在隱約父師存世逺情何極人亡道愈尊感君多古意珍重付諸孫仲宜以所植菊花見貽以詩答之新移初種菊送與老夫看粲粲黄金盞煇煇白玉盤雖遲偏有趣欲罷更凭闌烏府多松柏相期共歳寒經居庸北峽束石如鬭山迴路漸髙澗寒流水死衣冷北風鏖敗屋兵戈慘危途客旅勞晤人多出塞恨殺紫花袍題宗性性菴至理俱明徹澄澄海不波尚須妨蔽誘直欲致中和水面風光好天心月色多是菴清興足隨意得婆娑送胡宗性歸武寧二首江湖多薄惡兵甲更縱横失意青雲逺思親白髮生畏途宜得友隨寓莫兼程堂上思君切持身勿自輕文章追古作揮洒與時新可惜當衰運何由識偉人心堅無逺道孝感有神明華屋斑衣酒懸知笑語生輓劉原耕并劉母黄氏宜人我母忝同姓為兒猶弟兄親方悲夭折母獨喜恩榮紫誥金花爛斑衣鶴髮明暮年三釜養重我淚如傾五言絶雪罷小立二首風吹樹枝雪片片鮎人衣塵濁有清意半因忙失之呼童清曉起掃卻門外雪日出消作泥惟恐涴幽潔六言絶題羅斗明離别本來最苦相逢正值髙秋腸斷扁舟難挽煩君細問安流惟實集卷五
