body:
  text: 惟實集卷一元劉鶚撰請旨益師疏臣劉鶚奏爲請㫖益師事天下之師有勞而衞者有逸而樂者其勞逸之不同將謂將之智愚分乎師之強弱異乎不然何勞者之終於勞而望逸者之憩而不得也勞固可以勞終逸獨不可以勞見乎臣聞措社稷於泰山之安而河海不揚波者必馘其奸首使魑魅之徒烽烟絶滅然後可以久安長治也上今仁澤博施輕賦薄徭愛恤人才設㕘政二十四禦其險要撫於外而佐於内矣臣雖至愚前此職任翰林修撰親承命令宣布政治鞠躬數載而受恩汪濊是臣猶在天地之中戴天而不知其高履地而不知其厚也今者洞獠作亂詔守韶地寢不安席食不甘味兢兢焉祇爲國家是計民生是安即刀鋸在前鼎􅀈在後決不敢二三其志以負我皇上優隆之至意於是臣男劉運以經歴而陞掌元帥事日試士卒偕將李如璋等力戰數月獠賊逃遁思悉平之以杜後患奈環韶皆山林深樹茂泉湧石巖人不能扳援而上馬不能振威而進爰分兵各崖下各谿間相應攻之勞勞刁斗擾擾干戈軍之困於戰者衆矣勦洗巢穴殲其渠魁散兵多而主兵少此崖敵而彼崖之師有難跋峻而救彼崖戰而此崖之師鮮能越川以往臣即日夜旗鼓夾道虎帳張懸用五火之攻行九地之術轉圓石於千仞之山決積水於千仞之區按形據勢斬賊首而奏凱自料兵少而將寡願陛下宥臣當死之罪念臣汗馬之勞苦耄年之烽壘勅令司戎發江潞之士卒沿省之人馬餉糧按期賫給韶之人民見之聞之咸曰兵益也將廣也我王撫綏百姓之心切也獠賊雖有邪奸狡出奚能當我中夏秉忠抱義濟濟將吏况易有曰王三錫命長子帥師獠賊勦而民風和將來深宫可以揮絃而理葢臣報國之心誠而望援之師急顧臣冒死奏請幸切勿以臣言爲謬臣死而不敢忘臣劉鶚草茅微賤罔識忌諱謹奉疏以奏元至正二十二年三月日直陳江西廣東事宜疏右臣鶚伏以比歲逆賊嘯聚顆黨併合醜類多方告警焚我蘄黄陷我江州諸路守臣皆棄城而逃遁總管李黼以無援而戰死臣履任之日濬治城池繕修器械召募丁壯分守要害偕諸將士百計捍禦雖事勢窮蹙之日宜爲安疆定國之計者也數年之内強寇稍却民賴安居十七年荷蒙聖恩授臣廣東亷訪副使聞命之日星夜奔馳度嶺而南修城濠繕甲兵仰仗天威軍士稍集民志得寧十九年遷臣守韶整頓軍旅撫綏地方城郭完固猺獠遁避謹將江西廣東兩省事宜爲陛下直陳之江西以鄱陽爲襟喉以江州爲輔臂袁臨吉贑當楚粤之要衝撫建廣饒控閩越之關隘至於龍興名爲省會居中應外宜慎簡良帥增設重兵諸郡有警則分兵援之至於各府則修築城池固守隘口團練堵截糧餉既裕兵氣自奮誠能於九江湖口各增一營衞備兵捍衞各置戰船百艘相爲應援則荆陽諸盜不敢窺九江湖口而臂指相應矣建昌信州又於闗隘謹以烽堠守以重兵則藩籬固而閩浙一帶不得越境而冦矣若乃廣東五嶺之外號爲四塞由南雄可向荆吳由惠潮可制閩越由高亷可以控交桂總廣東一省列郡爲十今分爲三路東則惠潮中則嶺南西則高雷此三者皆要衝也環郡大洋風濤千里皆盜賊淵藪帆檣上下烏合突來樓船屯哨可容緩乎爲今之計東路官軍必屯柘林以固要津中路之虎頭門等澳而南頭爲尤甚或泊以窺潮或據爲巢穴乃其所必由者西路對日本倭島暹羅諸番變生肘腋是西路所當急爲經畫者又烏可緩哉然臣今日所言者悉地方之要害而國之所患者由邊備之防弛臣竊慮今日之大勢亦岌岌矣自紅巾賊劉福通起兵於汝潁大爲心腹之患焚蘄黄陷江州是不獨江西一省也方國珍聚衆海上屢降屢叛焚掠沿海諸郡又不獨廣東一省也夫李黼之死於徐壽輝孤城無援也台哈布哈之死於方國珍駐海兵單也趙勝普戰湖口而行省臣星吉死之張士誠據高郵而知府李齊死之凡若此者既不能深防曲慮以消禍患於未然又不能選將練卒以圖恢復於目前天下之弊起於因循而成於蒙蔽州郡告警而方鎮不以爲然也方鎮告警而内部不以爲然也夫國家安危民生休戚大臣不以聞主上不得知其患可勝言哉臣願陛下嚴簡擢之法省㕘督之制覈功賞之實奮刑威之斷舉一將則衆議必簡任一人則羣疑莫奪賞一功則疏逺不棄罰一罪則貴近不疑如是則人格其心官奉其職由是而芻糧可充器馬可利城塹可固練習可嫺斥諜可明號令可信雖八荒之逺六合之廣皆能如身之使臂臂之使指若江廣區區之地又何必深長慮哉敢摭其大端約其形勢惟陛下斷而行之耳臣誠愚昧不識大計犬馬惓惓惟陛下俯賜覽觀幸甚元至正二十二年四月存心論太虛者天也氣化者道也合虛與氣有性之名由性與知覺有心之名是心也者所以盡性體天而黙運夫道者也曰德曰仁曰誠曰敬言雖殊而理則一無非所以明此心之妙耳言天則嚴其心之所自出言性則原其心之所由成言情則驗其心之所由發有志於聖賢者不可不求諸道有志於聖賢之道者不可不求諸心也世之人不知天之所以與我者大或放焉而罔覺天理既喪人欲漸熾因之處貧賤而移處富貴而淫義命之不知亷恥之不顧淪於嗜慾攻取之途浸淫沉溺茫乎其莫返孟氏謂學問之道無他求其放心而已夫學亦多術矣詞章記誦華也非實也政事功業外也非内也知必真知行必力行實矣内矣然知其所知孰統會之行其所行孰主宰之無所統會非其要也無所主宰非其至也孰爲要孰爲至心是已天之所以與我人之所以爲人者在是不是之求而他求焉所學何學哉夫心惟能存乃大故大其心則能體天下之物物有未體則心爲有外世之人止於見聞之狹聖人盡性不以見聞牿其心其視天下無一物非我天大無外故有外之心不足以合天心聖門之敎各因其人各隨其事雖不言心無非心也孟子曰養心莫善於寡欲葢寡焉以至於無無則誠立明通誠立賢也明通聖也是聖賢非性生必由養心而後至之養心之善有大焉如此噫其要矣乎其至矣乎邵子曰心爲太極周子曰純心要矣張子曰心清時視明聽聰四體不待覊束而自然恭謹程子曰聖人千言萬語只是欲人將已放之心約之使入身來此皆得孟子之正傳者也踐形論參天地者人也稟五行者氣也氣以成形而理寓焉葢無形者理有形者物無形之中而具有形之實有形之中而體無形之妙是以君子語上而不墮於虛空語下而不泥於形器則仁義立而與隂陽剛柔合同而化於道矣衆人牿於氣稟之偏狃於習俗之蔽而不能無人欲之私是以視則不明聽則不聰貌則不恭言則不從葢不能盡其形色本然之理則雖有是形而無以踐其形也聖人以中正仁義而立人極無一毫人欲之私是以視則極明聽則極聰貌則極恭言則極從推之仁敬孝慈信無一不止於其所是形色本然之理施而悉合焉顧自二儀既判有理斯有氣有氣斯有形渾然一體而不見其有餘物各賦物而不見其不足動靜可求其端隂陽可求其始天地可求其初萬物可求其紀鬼神知其所幽禮樂知其所著易曰窮神知化德之盛也又曰窮理盡性以至於命邵子曰性者道之形體也道妙而無形性則仁義禮智具而體著矣程子曰天運而不己物生而不息皆與道爲體者也是以君子盡性而自强不息焉朱子曰太極者本然之妙也動靜者所乘之機也由是觀之人能超乎形氣拔乎物欲達其初心則天下之理得矣天下之理得則可以參贊位育而成位乎其中矣疏水曲肱樂在其中論天地之間元氣流行無一處之不到無一時之或息聖人之心與天同體故無時而不樂也豈以富貴貧賤之異而有所輕重於其間哉何者天之所賦我大而物小聖人見其大而忘其小耳見其大則心泰而無不足無不足則富貴貧賤處之一也處之一則能化而齊然必曰不義而富貴視如浮雲則是以義得之者視之亦無以異於疏食飲水而其樂亦無以加爾不觀之太虛乎湛然空明無物不照仰焉而莫窮其紀彼浮雲者倏聚倏散而於太虛毫無所礙聖人大行不加窮居不損其視富貴漠然無動於中亦若是而已易曰樂天知命故不憂又曰窮理盡性以至於命聖人理窮焉而後樂也性盡焉而後樂也命至焉而後樂也此則聖心之真樂也周子所謂無欲故靜程子所謂有主則虛故能彌綸天地出入造化進退古今表裏人物者焉而烏能究其道之所至又安能窺其心之所樂爲何如哉回也不改其樂論人患不知道也不知道則跼天蹐地而一身無所容於是覺天下之物皆大而我獨小夫我小而物大將只見物不見我其於世之崇高富貴視之巍巍然即躬處優裕而此心常歉然不自足將戚戚者終其身而無窮期矣顔子則不然顔子之心無少私欲天理渾然是以日用動靜之間從容自得而無適不樂不待以道爲可樂然後樂也故凡目之所覩耳之所接身之所履境遇之紛乘事勢之困迫世故之震撼千態萬狀而莫之紀極舉夫一切可驚可愕可憂可喜之端而其心安然不動處之以泰然而無不足又何簞瓢陋巷之足以累其心哉夫境自外至者也心自内生者也心有未純由道有未充耳道之未充則境爲身累身爲心累不特簞瓢也陋巷也是則富亦可憂也貴亦可憂也以視古之履天位而不疚被袗衣而若固有者其相去爲何如哉故謂顔子之樂非樂貧也但不因貧故累其心而改耳如以爲樂貧將使顔子進而居帝王師相之位其樂豈遂不可問乎易曰顔氏之子其殆庶幾乎此孔子所以賢之也昔二程受業於周茂叔令尋孔顔樂處明道未得其要汎濫於百家出入於釋老者幾十年反求於六經而後得之噫欲尋孔顔樂處如是有其要則學孔孟之學者可不究心於此以求至於道也哉浴沂風雩詠而歸論天地和則萬物順是天地萬物各得其所也聖人以茂對時育萬物則又體天地生物之心以爲心具此含𢎞之量胞與之懐安有物我内外之間哉然而能志此者鮮矣孔門四子言志而聖人獨與曾㸃何耶三子皆言他日之所能爲而曾㸃但言今日之所得爲期所期於後不若安所安於今也夫此道之體充滿無毫髪之缺此道之用流逝無須臾之停苟有見乎此則出王游衍皆天也暮春之日物生暢茂之時也春服既成人體和適之候也童冠偕而長少有序也沂水舞雩選勝而登臨也既浴而風又詠而歸樂而得其所也未幾而夕陽在山好音過耳游人歸而禽鳥樂也人知曾㸃游而樂而不知曾㸃之樂其樂也就其當前之事以窺其自命之志則固藹然見天地生物之心聖人對時肓物之事也夫亦安有物我内外之閒哉學者見道而疑心爲物累即不能從容閒適而其氣象之間已大不侔矣觀曽㸃之鼓瑟少閒乃徐舍瑟起而對焉而志之所存又未嘗少出其位蓋澹然若將終身焉此其氣象之雍容閒暇志尚之清明高逺爲何如而非見道之明心不累事而能然耶葢藴之而爲德行行之則爲事業其視三子者又當何如也哉鳶魚飛躍論道爲天地之本天地爲萬物之本以天地觀萬物則萬物爲物以道觀天地則天地亦爲萬物故天地之道盡之於物天地萬物之道盡之於人人能知天地萬物所以盡於人者然後能知道也何則道之流行彌綸天地充塞宇宙無所不至在上則鳶之飛而戾於天在下則魚之躍而出於淵其在人則日用之間人倫之際夫婦之所知所能而聖人有所不知不能者皆此也飛者鳶而所以飛者非鳶躍者魚而所以躍者非魚蓋飛躍者性而所以飛躍者則道也爲造化之發舒即爲心性之呈露爲在物之靈氣即爲在我之天機翺翔游泳者爲物理之自然而親上親下者爲中和之位育物物一太極而莫窮其費也萬物一太極而莫測其隱也任舉一鳶而飛者率其飛之性任舉一魚而躍者率其躍之性引而近之推而逺之而無非是也君君也臣臣也父父也子子也各止其所而不可亂也人能常存此心則息靜之際全體透露妙用顯行無所滯礙非必仰而視乎鳶之飛俯而觀乎魚之躍而後可以得之也夫惟實集卷一
