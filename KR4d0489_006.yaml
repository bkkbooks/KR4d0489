body:
  text: 惟實集卷六元劉鶚撰七言古四月十三書所見天厯二載春客燕河清海晏消戈鋋上林四月風日妍乘輿思樂遊龍船鳳輦並駕花雲軿騎麟翳鳳驂羣仙鸞旗屬車相後先牙檣錦纜相蟬聮萬馬雜遝蒙錦韉千官扈從控紫弦和風不動舟徐牽瓊童玉女歌采蓮黃門傳宣奏鈞天龍伯國人夜不眠金支翠斾千花鈿光怪出沒明遙川紅雲翠霧覆錦筵青鳥飛去當帝前珍羞玉食羅紛駢駝峯駱乳繁馨鮮御爐紫烟浮龍涎金甌璚液凝醴泉才人歌舞爭取憐南金蜀錦輕棄捐龍顔一笑春八埏臣子拜舞呼萬年嗚呼吾皇聖智軼漢宣但恨子虛之賦無一能為君王傳醉歌常聞有客卑當時我謂客語更過之及今更事匪客過往往亦足卑當時胸中愴惶失所主忽為虎兮忽為鼠昨朝蝴蝶今不飛舊日衣冠為誰舞令人覩此中心哀飄然欲賦歸去來山中酒熟花正開人間久無燕昭臺題寧戚叩角圖丈夫有志凌青雲時窮偶與蓬蒿羣牽衣飯牛豈所樂一飯不敢忘吾君雪花光芒歲將晏叩角長歌發悲歎草團篛笠不禁寒長夜漫漫幾時旦嗟我齊桓真好賢拔之牛口行青天君臣慶㑹勳業異千年汗簡猶流傳食黃瓜二章章五句燕山五月新嘗瓜淺黃深碧風韻佳食之颼颼清齒牙時來微物亦薦達使我撫髀長咨嗟却憶去年之來時天風搖蕩黃花期回首歲月如雲馳人生斗酒即行樂功名竹帛將何為嶺南即事昨朝炎風今日雨今日濃雲昨朝暑陰晴寒暑片時間到此令人信難處矧今世事多舛訛晴日常少陰常多隨宜料理强排遣天運若此將如何題東山髙卧圖君不見今將官徒知學公攜妓遊東山一朝傳聞賊至關匹馬逺竄不復還又不見桓司馬秦苻堅叛逆之氣凌雲烟惟公胸中兵甲全成功談笑神怡然嗟哉方今羣盜等螻蟻之子見公應愧死子卿持節圖龍沙茫茫雪如雨大窖雪寒羝不乳孤臣持節十九年忍死不降思報主方今世事紛如雨同安虎頭真忠臣江州太守骨已朽尚書却作洪都守感時撫卷雪漫空為弔忠魂酹尊酒題禮部尚書巙子山神仙亦時有公子間時無公子世豈無不如公讀書神情俊朗自仙骨清淑之氣鍾扶輿娟娟夜月明瑤瑜燦燦秋水涵芙蕖既不愛臂鷹逐兔馳飛菟又不喜楊花撲帳斟流酥心之所樂者左置史右列圖筆牀茶竈勝具俱衣冠文物來羣儒清宵管絃罷歌舞白晝翰墨供歡娛列職於春官復能以禮樂致主於唐虞主上眷顧桓渠渠功臣世胄有如此風雨喬木清敷腴公子可謂間世無且聞有巙山乃是公所居清泉白石日輝潔幽花野草春扶疏山中桃李亦仙品風月迥與人間殊公猶神仙山蓬壺惟公與山聞京都蹇豫抱大拙來此亦已久既不能彈鋏干田文又不能學求齊以吹竽世尚誇詐吾迂濶吾篤信義人浮虛鑿圓枘方齟齬不相入旦夕惟有食破硯邇來冰凍硯亦枯然亦甘崎嶇樂此無怨吁進退必以正求為聖人徒聞公髙誼壓千古所以願曳侯門裾其足非趦趄其口非囁嚅其詩非狂亦非諛嘗聞昌黎言以為古來王公布衣前後常相須乃可千載垂名譽吾意若此公躊躇遇與不遇天何如歸來乎歸來乎文夫既不能如田千秋一言悟主生封侯又不能如主父偃奏書直上黃金殿君臣千載遇合難飯牛長夜何漫漫胡為久客衆公間進退俯仰多靦顔歸來乎孟嘗君不可作平原君骨亦枯買絲欲繡空糢糊邇來卿相不好儒客且無履安得珠雖云二子未盡道尚能與客相傾倒白玉樓空燕不飛黃金臺圯生秋草歸來乎京師不可以久留歲晚霜雪侵貂裘山中風月如清流醉餘菊花簪滿頭千秋奚足顧主父焉能儔歸來乎先人有書今尚存青燈夜雨當細論孰云落落苦難合有志可致乎青雲他年歲君在癸酉看花爛醉瓊林酒附翰苑羣公和韻歸來乎未可歸吾聞志士常思秋亦欲為相為公侯歸來乎未可歸放牛歸馬武初偃奎章閣近通明殿時來金印信不難乘風寧患海水漫騎麟翳鳳紅雲間玉階咫尺瞻天顔歸來乎未可歸有硯尚未枯有墨雲糢糊天子明聖方崇儒貴士價若驪龍珠士當報主志行道扶持莫遣戈輕倒昌黎束書三十年刻苦成名非草草歸來乎未可歸姑少留幸有季子之狐裘公庭對䇿如奔流快意亦可持鼇頭烟霞泉石豈足友深山鹿豕非吾儔歸來乎未可歸我舌今尚存唐虞要與吾君論綱維人倫正臣妾剸剔讒蠧驅氛雲大明當天未遇酉薰陶和氣濃於酒羣公見和又答四首歸來乎蟪蛄生不知春秋變滅頃刻猶王侯歸來乎五陵草木盡披偃昨日秋螢滿梁殿廢興反掌元非難海水清淺塵瀰漫吾寧終老青山間猿吟鶴唳聊醒顔歸來乎喚童子治我圃無使霜後菜本枯禦寒更遣窗重糊從教壯士嗤為儒我價自若照乘珠文章烏足存古道底用詞源三峽倒功名已付雨中花意思要同窗外草歸來乎常笑張子房崎嶇願封留何如大澤披羊裘忘機傲兀臨溪流富貴不足回其頭髙風千載誰當儔歸來乎故園之菊今應存此事欲與淵明論孤松獨撫倦飛鳥出岫雅愛無心雲明當秋風月在酉粳稌初黃催釀酒歸來乎古來聖人作春秋始尊王室嚴諸侯一辭初不待商偃巋然古道靈光殿綱維名教世所難初非鑿空凌漶漫二百四十餘年間亂臣賊子俱汗顔歸來乎後世多不然吾道秋葉枯紙扇一破難再糊種瓜冬實欺羣儒魏王反誚齊無珠紛紛似此不忍道冠屨衣裳盡顛倒蘇秦六國相金印園綺商嶺飯芝草歸來乎不可留山中木綿正堪裘乘槎鼓枻湘江流直欲下至滄海頭白衣蒼狗紛百變蛇神牛鬼寧堪儔歸來乎將安歸師之所存古今得喪奚須論有口不飲貪泉水有眼但看南山雲塵埃風雨卯復酉千載虛名一杯酒歸來乎生不必八千秋爵不必萬户侯飲河得如鼠之偃買花種作芙蓉殿世途荆棘進取難何况風雨長漫漫甘心局促筆硯間時於樂處尋孔顔歸來乎山中喬木冬不枯山前春到花糢糊胭脂梅綻酸於儒黃金橘熟圓如珠四時好景難具道有客叩門屣顛倒醉餘吟詩弄明月醉後從仙拾瑶草歸來乎客勿去客少留尊空尚堪脫鸘裘但願有酒如川流長使吏部眠甕頭山花野鳥自歌舞樵童牧豎相朋儔歸來乎四海故人今幾存心事落落誰相論邇來賴有揭閣老亦解為我歌浮雲人生幾何鐘報酉行樂舒心聊寓酒歸來乎我生今踰四十秋始悔識字求封侯少年意氣極驕偃謂當平步金變殿那知命舛百事難繭生兩足沙漫漫有時或墮荆棘間努力自奮終强顔歸來乎君不見功成一將萬骨枯髑髏之血猶糢糊弓藏鳥盡殺韓信幾敗公事罵豎儒笑揮珊瑚示侈靡豈意奴輩便吾珠誅夷封籍可勝道北風吹山山欲倒平泉木石又誰家金谷樓臺半芳草歸來乎故家猿鶴遮我留布袍暖勝貂鼠裘巾車乘興尋絶壑展席隨意臨長流周旋世事但鮎頭髙節每慕晉宋儔歸來乎及早歸生涯雖薄今尚存堯舜不必吾儕論攜書穩讀牛背日領鶴閒種芝田雲作勞暮歸正當酉擊缶嗚嗚呼斗酒天池魚君不見萬歲山下天池中赬魴赤鯉森蟻蜂荷陰栁影護深碧揚鬐鼓鬛何憧憧恩波浩蕩得所托異日或可隨雲龍乘輿北狩未及逺魚已就戮遭羣凶公然白日恣竊盜得錢聊復斗酒供聖恩自謂守禦固豈知守者元非忠羣鮮無知固可負忍負主意將為容又不見蒼生與魚正相似託身天池尚如此至正甲申歲大饑民多艱食殍死者相望盜賊擾擾豫亦缺食未免作粥以延殘喘因賦食粥歌以暢此懷朝餐一頓粥暮餐一頓飯每當食粥時未免一長歎少年何事不相遭胡為晚歲方論交此時菜蕨各已盡以糟配爾為嘉殽既啖糟復食粥却意年當三十六笑攜省檄上皇州曾以文章動流俗二程祠宇陋且卑我奮赤手更掣之至今穹碑照淮水碑成秩滿遊京師京師嬉遊二十載鐵石忍窮心有在聲名􅘒起鳳凰池風雲已際魚龍海當時結交多貴人往往尊我席上珍執經或在弟子列或遣弟子來相親劇談王道尊禮樂每激薄俗敦彞倫閭閻疾苦詳敷陳亦或一慨眉為顰有時華筵湖山下爭挽先生共陶寫滿堂座客盡豪貴亦知推讓宗儒雅盈盈珍饈簇金盤衮衮葡萄浮玉斝金叉十二列兩行班班初匪尋常者主人行杯極歡笑競唱新詞誇艷冶半酣相惱索題詩揮毫寫向香羅帕尊前為我發新聲自以風流望鄙野萬錢日食固有限一笑千金絶無價放懷滿飲鸚鵡杯何心復戀麒麟畫鷓鴣舞罷月欲上半掩城門歸並馬等閒髙㑹難具論酒酣掉臂金馬門三三五五正少年乘興共我歌浮雲窮冬出使居庸北駿馬穩步龍沙雪清霜在鬢冰在鬚指凍欲墮饑欲裂苦寒不透貂鼠裘青鼠暖帽方蒙頭璚田玉界中著我自是奇士真壯遊解鞍沽酒彈箜篌打手刺刺歌鳴謳丈夫有志在許國我自樂此忘羇愁連檣海運三百萬署黔楮尾方成卷每憂談笑誤王事朝夕驅馳敢忘倦湖廣文臺正乏賢諸公為買江南船漢陽春樹晴歷歷秦樓夜月明娟娟手提文印不半年首為鄂學歸侵田蓬山有詔歸朝天錦袍公子偕神仙宣文閣靜萬機暇時遣中官催進畫飽聆天語近天光神揖天香更瀟灑壯遊既倦思還家堨來庾嶺觀梅花桑麻絃誦各得所玉堂召我天之涯平生所歷猶在眼夜半思之皆夢幻盛時不敢忘貧賤自喜枯腸藜藿慣飽食粥無咨嗟爾糟爾粥甘如飴雞鳴曳履東家誰蕪蔞曾療王孫饑粥兮粥兮敢爾卻猶勝蕨餈滋味惡苟延殘喘待秋成白髮春風㑹如昨關武行關西澒洞風塵起諸將陳兵耀威武願言下教壯軍心攬衣下馬東門去盈盈野水抱城郭莽莽寒蕪翳沙渚沙場築臺髙十丈玉節光臨有攸止微風不動碧油幢暗塵輕拂銀交椅當軒下馬一寓目雲鳥魚麗俱得所帳前駿馬矯如龍帳下健兒猛如虎五方牙旗按五色戈㦸如林分部伍臺前獨建大將旗雲散天清日當午寶刀一揮牛首落血祭旌旄灑紅雨命官奏喜得吉卜士卒喧呼發金鼓曠懷浩蕩納乾坤老氣蓊鬱生雲霧祭餘分胙各有序㫖酒盈樽肉登俎酒邊好語相激昂世事艱危思共濟同舟慎勿異秦越四海相看總兄弟願無爭氣與爭功要在相歡勿相妬上下心同鐵石堅城池勢若金湯固黃河如帶山若礪當保初心與初誓我言剴切因流涕忠義推之人肺腑三軍感激各再拜願效驅馳報明主酒酣跽請獻所長萬馬爭馳置脫兔舞劍劃若掣電驚揚旗􅘒見飛星度止齊不愆六七伐練習初非朝夕故花奴技癢爭角逐干盾紛紛向人舞將軍一笑挽强弓百步穿楊駭相顧固知蒙恬勇無敵尤信張良素多智成都底用說花卿安西不復歌都護曲江江頭多壯士官陂小賊奚足數㑹當飛度虎頭城為弔英雄死何苦生擒賊奴剖心血灑向忠臣墳上土功成掃歸獻天子竹帛勳名耀千古通集賢全大學士枯桑昨夜生滄溟風雨擾擾晦復晴功臣子孫半零落惟公獨克承家聲金蓮坐擁晚出院兒童走卒俱知名天球河圖不篆刻金鐘玉鏞殊鏗鍧汪汪萬頃那可測撓亦不濁澄不清古今事物貫胸次乾坤風月皆性情邇來有幸亦再覩使我鄙吝不復萌始知將相真有種往往山嶽鍾英靈自憐片影雖伶仃不願恩叨一顧榮霏霏議論玉雪冰但願容我時來聽七言律元日天門蕩蕩開黃道丹陛雍雍肅曉班御氣擁雲蟠鳳闕春風隨酒上龍顔君臣慶㑹賡歌際禮樂升平揖讓間四海朝元無一事華封但祝夀如山曉起休官彭澤真忘世捧檄廬江喜為親薦福自緣渠薄命築臺敢謂世無人但明一藝俱登仕獨擁羣書不療貧竽瑟相違每如此且須珍重百年身鐵馬伊誰巧鑄涯窪姿簷外鏦錚一線羈帶甲有聲如擊刺憑鞍無力任驅馳湘妃環珮天風急蜀道霖鈴夜雨悲漫爾哀鳴求一顧奈何鈍質本無奇盆池池中地窄一泓多滿注流泉復幾何皓月初圓先得影微風雖動了無波可容赬鯉十數輩僅種圓荷三兩窠兀坐小窗炯相對眼明時見白雲過苦雨獨坐有感白黑賢愚混是非詼諧調笑足投機平原具眼猶輕遂延賞何人解識韋紅杏碧桃應懶種孤雲野鶴自髙飛世間處處魚羮飯好及秋涼早賦歸彭澤江漢朝宗第一門擎天老樹碧璘珣乾坤設此寧無意鬼物因之遂有神一曲湖山知幾劫千年風致屬何人淵明老矣遺祠在他日歸來願卜鄰白鴈稻粱寒暑老營營贏得秋霜滿背明夜月蘆花空有影江天雪暮但聞聲鮮鮮固與常禽異皎皎尤為俗眼驚珍重素衣須自愛緇塵近日滿江城雙陸摴蒱小戲只消憂但恨無人為點籌幾箇疏星榆塞曉半彎殘月雁門秋六軍先滿俱成列單馬如飛肯少留遲疾知幾應甚速不知何日取封侯射虎弓强矢徑馬初肥獵得南山白額歸勢力頓窮甘就戮爪牙雖具果何為深山百獸應無恐絶壑幽狐莫假威笑取髑髏橫作枕壯哉殊足快當時梅信破雪爭春喜奪魁好音到我亦悠哉孤山久渴詩人想庾嶺初逢驛使來風細暗傳香迤邐月明難覓影徘徊來朝著意勤尋問只在前村野水隈聞新事平原草木幾無主金谷樓臺半是塵已信齊桓能輔國焉知陳勝足亡秦國家自昔明刑憲天地由來有鬼神太息渠儂終不悟翛然吾自愛吾貧雪作蕭同可有詩次韻風髙海水化為石天迥野雲俱是冰訪戴何人復乘興平吳當日孰先登清和月影明無奈寒入梅花瘦不勝大地無塵車馬寂曉來胸次尚澄澄大明殿觀元旦朝儀雲開日上黃金殿地迥風鳴碧玉珂虎豹關臨儀仗肅魚龍海㑹俊良多霓裳按曲身輕舉天樂逢春律自和鵷鷺陪班臣子事觀時且賦太平歌雨後雨餘新水釣魚船殘日西風樹樹蟬間憶平生如昨日不知急景已中年姓名未辱當時識德業猶堪異代傳拔劍悲歌頻起舞茫然欲絶伯牙絃中秋又此中秋百恨生頻年骨肉尚飄零獨援北斗酌明月閒看銀河感客星極目關河歸白晝滿懷風露立青冥眼前咫尺清虛府未許乘鸞叩玉扃廣寒殿殿在萬歲山上山在水中髙數十丈怪石古木蔚然如天成殿在山兩傍稍下復建兩亭正當山半又有殿縈然竹石間山下積石為門門前有橋橋有石闌如玉前有石臺上建圓殿繚以黑粉牆如太湖石狀臺東西皆板橋橋東接皇城西接興聖宫水光雲影恍惚天上喜而遂賦二首萬歲之山天半青廣寒宫殿倚空晴雲生檜柏巖巒暝日射蒲荷海水明白玉闌深仙仗隱緑楊橋鎖小舟橫人間天上神飛越恍惚霓裳第一聲怪石疏林逺艮岑經營已近百年今樓臺白日神仙集雨露青春草木深游豫無忘前聖度登臨還憶上皇心廣推此樂同天下四海謳歌歲旱霖次韻家西隱叔見寄前人碩德集隆禧二百餘年運未衰薄劣何堪文學掾登庸幸際聖明時蹇驢破帽隨緣好淡飯黃虀到處宜三讀來詩殊有感貽名善惡敢忘思附來詩氊寒紱冷宋天禧十世中間幾盛衰青紫每由稽古力公侯端有復初時不能拔俗慙癡叔足以光前賴阿宜見說除書新入手錦還何日慰吾思孫錫種盆菊列為河圖菊布河圖眼自寬緇衣如海不相干幽姿過雨秋逾好清意冰人夏亦寒晚節獨宜髙自重落英雖美竟誰餐春風桃李非知已珍重瑤琴勿浪彈九月三日龍虎臺接駕晚宿新店關南九月草凄凄又見征人扈蹕歸日落氊車團野宿天寒塞馬覓羣嘶倣徨戀闕孤忠在俯仰隨人百計非猶幸諸公同笑語歸來茅店謾雞棲九日次韻京華四載倦為客樂事良辰豈得兼官况甚於紗帽薄酒懷聊為菊花添文章無用甘牢落刀筆隨宜謾伏潛忽得新詩破孤悶為君一笑起巡檐九日以公事隨官曹之西山新寺與宋良卿遍遊諸寺京城西北地多幽依約江南九月秋湖岸草枯霜欲下野田水落稻初收鄉心無奈還隨鴈機事相纏獨愧鷗猶喜簿書今頗靜追隨官長賦清遊西山即事鼇頭突兀黃金殿水面空明翡翠樓錦繡山河天有待帝王宫苑地長留烟迷栁影三山曉月浸荷花十里秋更一登臨多勝槩五雲南上即神州玉泉山楊栁芙蕖接斷岑流泉如玉本源深四時瀲灧無晴暖一派清泠有古今石井分甘供御膳湖波流潤洗塵心我來正值秋將晚獨坐長吟雪滿襟孤塔蒼崖結搆牢巋然俯視世滔滔烟雲連野心同逺樓閣依山步漸髙性本虛明宜自得無經悟入亦徒勞可憐有客勤三禮不見靈光現玉亳壽安山漢皇遺寺在人間長使忠臣帶淚看六曲樓臺殊壯麗九天風露愈髙寒乘輿血汙黃金輦圓殿苔生碧玉闌利益福田真浪語當年共想壽而安香山永安寺幽巖絶壑倚雲齊傑閣危樓望眼迷山勢渾雄龍虎踞樹陰深蔚鳥烏啼碑存金志猶堪讀寺始唐家竟莫稽此日清游天所借明朝驢背聽晨雞長廊徙倚愜幽期衮衮黃塵暫息機山鹿背人銜木實石泉經砌瀉花池九天風露圍青瑣三峽烟霞繞翠微但恨山僧多俗客飽看清致更無詩次友人韻飲罷騎驢出鳳城拜郊臺下賞新晴一春苦雪花多死十日南風草盡生髙冢纍纍牽逺恨流觴落落負幽情歸來卻憶家山好紅緑參差坐聽鶯次舍姪尊謙韻二首燈吐幽花豈我欺客來驚見墨離離平安有字誠堪喜漂泊無家不自知此日禁花和露看何時野鶴與雲隨每懷竹下相從樂煮茗談詩事事宜仕路莫踰科舉捷生涯賴有父書存極知世事宜酬應但得工夫更討論一旦風雲滋筆力九天雨露沛君恩歸來了卻為兒願碑刻封題記某墳離别經年豈不思山林鐘鼎苦何宜喜聞門户能如昔敢意田園近稍滋浮世於人多薄惡同心為汝好扶持蕃生書子猶煩教他日成家未可知次舍弟此心韻獵獵塵沙吹曉風無端馬滑更霜濃可憐鬢雪千莖白才覩宫雲一朵紅平昔亢宗徒有志此行報國似無功弟兄何限相思意回首長安落日中題南雄府壁二律榕陰滿地草齊腰官舍如僧更寂寥隙地風涼人牧馬長廊吏散晝鳴梟寸心謾切公家務兩耳惟聽使客軺可是逢迎少蹉跌謗聲載道骨形銷少年館閣恣遊嬉老去何期墮有司酬應敢云千慮失奔馳知忍幾回饑據鞍尚覺精神壯度嶺方憐氣力衰何日歸來茒屋裏夜涼閒聽玉參差挽劉原耕并劉母黃氏宜人令子攜書賦宦遊胸中初不著離憂懶看綵服爭春色喜見梅花寄隴頭髙冢松楸殘照雨平原禾黍舊時秋貯書淑子無遺憾細讀豐碑識故侯洪都人李仲俊至避人避世愁無奈全節全身計未差始信盛衰元有數敢期漂泊老無家鱣鯨失勢滋螻蟻鸞鳳韜光噪晚鴉未必蒼天終困我春風骨肉故園花題許氏蘭秀軒淨几明窗春迭蕩湘花劍葉影扶疏易當妙處花前讀詩到工時葉上書舊雨栽培還若此只今離亂定何如獨憐諸老留題在恍惚幽芳夢故居偶題二首階前榕葉亂如雨窗外老鴉啼向人垂老觀書偏損目殊鄉哭友倍傷神古今生死真常事家國安危係此身嶺海願言將息好天根月窟有餘春嶠南何似八九月暑氣著人如火燒近午炎光幾奪目此時厲氣正生苗但教節飲神應旺尚覺寬心脈自調但得太平開嶺海歸尋舊隱老漁樵九日痛恨長安信息乖江南江北半雲霾極知隨處有白酒爭奈憂時無好懷淡淡黃花誰作主蕭蕭紅葉自空階亂離不敢登髙處忍見蒼生萬仞崖芙蓉菴山亭始於漢隱老康容所居後葛仙翁煉丹於此竈尚存旁有石煤如豆一菴髙寄碧崔嵬山崦芙蓉錦作堆滿眼烽烟天地老隔江樓觀畫圖開雲房猶是康容宅丹竈空餘晉代煤豈為登臨行樂計要從髙處望蓬萊題寄曹溪禪寺并東南山長老三首親承祖意振宗風一派曹溪萬折東傍石作亭憐卧虎臨泉持鉢度降龍天開圖畫平山勇人仰菩提四海同劫火彌天仍獨在吾師信是佛中雄詔持玉節遍咨詢嶺海重來白髮新濟世不存菩薩行當年徒見宰官身痛憐世外何多劫逺想山中别有春寄語堂頭大和尚何當握手話前因萬剎飛灰海變田是中孤塔尚巋然此山可謂有盛福當世宜稱第一禪直指人心懷達摩洗空塵慮憶坡仙少須了却澄清志拂袖從師學引年聞瑞州太守東廣憲副宣命俱至喜而賦之筠臺璽檄珠猶濕東廣除書墨又新草莽何堪蒙聖眷菲葑猶下念孤臣茫茫關塞連烽火莽莽乾坤溷劫塵嶺海微臣無補報提攜風紀保斯民暇日有懷士彥四首誠心公道宜開布愚婦愚夫更有知遇事當從彞理聽操心應比孽臣危海翁易慮鷗飛去盧老忘機虎卧隨共說此君曾學道是中滋味願深思提攜寶劒斬長蛟獨運神機不憚勞快覩中天懸日月徐看滄海息波濤劇談英武今誰敵若論猷為昔更髙老我惟當相羽翼太平和氣要薰陶溝壑崎嶇徒自苦每尋正學究天人狼貪虎暴從渠鬬月窟天根自有春平昔操修惟至善此來受用是清貧是非黑白吾寧辨願振臺綱洗瘴塵老病君王不見疏鞠躬盡瘁意何如清晨上馬了公事靜夜張燈課子書氣直干霄山嶽動精誠貫日鬼神徂請看南海韓夫子援筆為文徙鱷魚次顔子中都事韻猶當相與守危關自古忠臣鐵作肝非敢偷生忘故友且須忍死報平安干戈荏苒情何極禮樂隆平運未殘攬轡澄清當努力誠心北望思漫漫次韻將軍號令凜寒冰雞犬村村夜不驚弓徑始知雙臂健賊多翻覺此身輕兵戈劫運臨關盡烽火妖氛到海清笑取虎符歸故里兹行殊不負平生歲晚書懷一官歲晚尚驅馳骨肉遙應怨别離衰世功名何足貴暮年風節正須持凌人劫運今還盛報國忠心老未衰奏凱還家歸路好綵幡春勝簇前旗除日試筆桃紅酣雨更精神久客俄驚節序新好是一年將盡夜喜看萬物又回春元正紀朔還逢甲榖日祈豐復得辛泰運昭回消劫運嶠南同作太平民元日試筆曾隨仙仗立仙班誤逐紅塵落世間遙向孤城瞻鳳闕定須清夢繞龍顔乾坤劫運隨雲散嶺海春光帶雨還三祝聖躬千萬夀老臣長與護梅關寄士彥監憲半載韶雄厭滯留雨添新水送行舟何因不動南來興所願聊分北顧憂賈誼感時書濺淚孔明經國筆為籌使君倘採强邊䇿春滿關南十五州元宵奉邀使客張鵬飛照磨過官署小酌北走南奔今日苦東塗西抹少年曾何妨過此共明月勿謂亂來無好燈天上鼇山空入夢城中竹葉謾為棚九城風景雖寥落頗覺承平氣象增夜闌再用前韻夜半尚聞簫鼓響開門領客興來曾歷千萬劫有今日近四三年無此燈兒女競歌桃葉渡風光翻盛木香棚承平願與民同樂老遇艱危氣益增明日鵬飛照磨賜和再用前韻二首自憐老去情懷别笑拾花鈿不復曾良夜好天千載意光風霽月四時燈暫辭江表烟塵海偶上人間傀儡棚一片忠君心似血鬢邊白髮邇來增討賊七年殊費力致多如此舊何曾幸無驚犬去吠月贏得閒錢來買燈正好從容花海㑹莫教零落翠雲棚兒童笑指遊人醉共說新來酒價增偶成二首中慶堂前日欲西干戈未息思依依但知為國事經濟縱使傍人說是非衆口難調無善䇿入心如面有危機揆豫俯仰無慚怍山鬼通神自向微寸心長共白雲馳時繞蒼龍闕角飛羣盜紛爭何日了中原北望幾時歸天心劫運應難測世故人情愈覺非坎止流行隨所遇商顔芝草及春肥寄義士吳元良幾年四野龍蛇鬭嗟子勤王獨至今曾為憂民添白髮屢從殺賊見丹心當思臣節如山重更憶君恩似海深善惡貽名宜慎擇倚樓西望為長吟曾惟吉乃祖巖山先生三告身起家在宋當淳祐文武兼資早致身翠竹蒼梧家學逺回鸞翥鳳誥詞頻桑田滄海人何在錦軸牙籤墨尚新覩物使人雙淚墮痛憐封誥總成塵奉别瑞甫髙掾郎還南臺市舶亭前新水長樓前欲發奈情何莫愁柏府同天逺所喜南風五月多徑氣橫空秋迭蕩清標映日玉嵯峨矧君素節廉如水未必黃庭肯換鵝分司北道留别監憲五首玉節光浮士氣和不須更問夜如何湟中願學趙充國徼外當如馬伏波要使蠻夷歸禮樂佇看嶺海罷干戈不煩主將多憂顧笳鼓歸來雜凱歌巨鎮名藩壓海濱豈期四海漲烟塵丹心激烈寧辭老玉斧驅馳不為貧此際出師宜有表向來餽餉豈無人勿容耿鄧專前美好遣皇家識漢臣志未能酬賊未除衰年豈敢戀安車願言息壤堅盟誓從使中山有讀書寂寞宛如天寶後升平無復至元初㑹當勒石凌烟閣返我承明舊所廬玉節提兵昔見之風流儒雅是吾師據鞍矍鑠誠堪畫橫槊從客謾賦詩破賊要如驅海鱷憂民那得避仙蜞强兵富國當留意乘興長驅庶可期羣盜紛紛苦未休檄書催我上韶州已看肥羜供新饌更泛清尊慰别愁天眷老臣恩至渥君於老友禮殊優他無補報惟忠義明日驅車不復留謾書麾下更無兵可調城中又乏米堪憂孰為報國忠君計姑作求田問舍謀兔只守株寧可待魚從緣木豈能求老夫束手愁無奈白盡平生未白頭寄蒙君禮元帥俄驚飛鳥度轅門殺氣平將賊寨吞社稷人民俱政要豺狼蛇虎總消魂軍心一若背水陳糧餉多於五丈原俘馘凱還應有日奇勳泚筆為君論水仙花二首水府羣仙别一家清標為洗世鉛華霜根種種八九月獨幹亭亭四五花素質自堪齊玉雪冰肌那肯混烟霞他時明月瑤臺下一笑相逢更絶佳凌波仙子太輕盈鍾得扶輿氣質清太史謬稱礬是弟花神應許我為兄翠葩不逐春風轉玉骨惟隨夜月明置向席間看不厭哦詩同訂歲寒盟栽松分司無事日徘徊移得新松手自栽直幹行看龍天矯清陰留待鶴歸來冰霜此日存髙節廊廟他年獲大材寄語樵夫休剪伐要看百尺接天台歲除水仙梅菊盛開與鵬飛照磨飲於花間賦之轉眼驚看節序新水仙梅菊喜相親時窮幸有花堪友道在尤多客可人清意紛紛涼似水孤標鬱鬱更無塵明朝又道春來到歲晏誰云此老貧元旦即事録似鵬飛照磨旭日微雲淡淡晴早朝鴉鵲寂無聲龍樓鳳閣渾如夢水國山城謾有情浩劫固知今止極衰年幸再覩承平功成不作從山計擬學長沮事耦耕元日宴集中慶堂客散後留鵬飛再酌用前韻宴罷驚看曉日晴共傳街市有歡聲故鄉休問今奚似薄酒何妨更盡情遣興賦詩那用好感時撫事苦難平塵清共作江南計旋買荒田趁早耕新春記實二首新春和氣頗薰蒸共說今年可太平滿眼干戈誰擊賊繞街簫鼓强題燈常悲塵世陰晴半須信人生苦樂并老去不為兒女態引杯看劍起呼鷹憂國煩心苦鬱蒸眼中萬事况難平開懷且共新豐酒亂眼猶疑太乙燈歲晏孤蹤猶嶺海夜闌清夢刷幽并栁林記得朝元罷曾侍鑾輿學臂鷹復元日韻東風巧放立春晴喜聽謳歌變頌聲浩劫逼人還有極老天於世豈無情雲收雨罷山猶在日麗風和浪自平寄語羣凶早回首賣刀買犢好歸耕試燈小酌用前韻山澤春回氣尚蒸黑山四合與雲平清髙庭館蕭蕭雨牢落杯盤草草燈競利爭名人易老賞心樂事世難并老來尚被微官縛何日能如脫臂鷹除夕韻每憶盤銘日日新讀書燈火老猶親姓名雖或聞當世德業還應愧古人百歲光陰嗟白髮十年蹤跡困紅塵太平倘與春俱㑹一笑渾忘病是貧送謝仲宜歸五羊酒盡沙頭意惘然君今歸理曲江船曾同憂患難為别欲取功名莫計年世亂人心機似箭雨餘山路瘴如烟諸君倘問余何似一片丹心可對天寄友為紅巾破九江府早歲同遊鳳闕前於今鬢髮各蕭然御街楊栁春風馬海子芙蓉夜月船滿望功名圖晚歲豈期衰朽度殘年九江二水難回首報國忠君各勉旃寄鄉人袁觀所瑟瑟秋風吹客衣夜涼如水曷勝悲早知多難有今日何得長貧似昔時華屋凄涼芳草合黃金散盡壯顔衰妻孥流轉無消息幸賴綱維有故知題劉大觀詩卷後少年壯氣拂雲霓馬上鷹揚老未衰蕩滌奸凶仍好武遨遊江海更能詩池荒固自多春草世亂偏驚見瑞芝何况屯田有長䇿曲江真足駐雄師九日置酒與從事飲酣書事示李子運倐而虎鼠倐蟲沙世變如雲似未涯幸有故人來白酒且開好况對黃花紛紛涼月中軍帳獵獵西風絶塞笳料得來春匡濟了笑扶玉節共還家次韻懶能䇿蹇詣時官且喚青山共倚闌春到謾尋花作友客來須借酒為歡山中泉石論交易天上風雲入夢難奉母讀書今有日卻從北斗望長安中秋有感京國湖山十二年年年兩地望嬋娟流光過客催我老明月與人今夜圓又逐雲萍來嶺表幸同兒女樂尊前可憐有弟頭如雪爛漫斑衣繞膝邊登快閣一登快閣情何極太史騎鯨已上天烟樹溟濛秋可畫江山空濶客如仙半生不識東南路浪迹深慙上下船四海故人今聚㑹忽驚歌舞落尊前題興化縣嚴士奇詩卷盤錯載逢知利器冰霜屢閲見生涯輕車熟路老為縣短什長篇真當家今雨田田饒榖粟東風處處長桑麻公庭靜坐無餘事閒數梅開第幾花送徐伯髙共宦關南三見秋相看政好又韶州故家喬木今千載碧嶂清江第一流案牘暇時仍閲史江山佳處更登樓如今刀筆皆為相好取功名趁黑頭送李子潔巡按十載相違一見君何堪歲晏又輕分南風十日不成雪一雨滿山都是雲滑滑長途宜自重蕭蕭孤驛不堪聞周原郡邑咨詢遍為弔斯民志獨勤次韻節序匆匆又落花幾回滄海歎乘槎不聞庭竹來鳴鳳祇見宫槐噪晚鴉老去可憐心轉赤悲來那覺鬢生華明當拂袖江南好山雨晴時筍正芽奉别瑞甫髙掾郎還南臺嶺海屢驚來詔使蠻方孰不仰皇都自憐老去難為别但有人來莫惜書乘興何妨吟萼棣思歸應不為蓴鱸臺端歷歷陳時弊十道疲民未得蘇有懷蒙泉都帥二首討賊提兵垂十稔老成練達亦吾師豎儒幾敗乃公事男子要為天下奇公瑾孤軍鏖赤壁謝𤣥徑氣破淮肥從渠百萬終為賊要取梅關卻賦歸卜式助邊常百萬如斯乃可濟時艱傳家自有遺經笥報國無忘拜將壇滿眼黃金輕似土他年清節重如山廣東未必真忘我但有官鹺定撥還韶州圍城浩劫如天似未涯生民性命等飛花兵戈轇轕動萬計柴米從容有幾家宇宙豈應將拆裂英雄到此謾咨嗟忠肝義膽難磨滅自昔睢陽世共誇枕上偶成常思為國致升平每事參差謾有情天魔未除難學道國糧不足莫論兵痛憐劫運如長夜起視明星近五更待得朝廷消息好笑攜兒子賦歸耕答胡海翁胡宗性重謁悠然無語眄庭柯風雨傷春奈若何浮世周旋如子少餘情流麗向人多好詩寄我頻三誦窮巷經年一再過無酒固難淹李白空餘文焰照松蘿附來詩暖雲扶緑上林柯春去春來可奈何逺道塵泥行客少故園風雨落花多擷蘭溪上心非隱種栁莊前足怕過尚意玉堂青眼舊肯嫌俗駕忤烟蘿惟實集卷六
