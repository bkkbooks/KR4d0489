body:
  text: 惟實集卷二元劉鶚撰送胡宗性歸武寧詩卷序宗性胡君雙井里茂族也其先出廬陵少負竒氣與其兄宗説聯輝競爽不逺千里從歐陽圭齊先生學先生竒之特書性菴二大字揭其讀書之所後歸自翰林又為之銘先生豈輕許人哉歲壬辰兄仕潭城君先承先生薦為善化冷職以兵變歸道經永豐避地問友遂留澤泉陳氏館中雖讀書為文不少倦然中心鬱鬱念母不置以不知母安否何如夜必焚香籲天者一年有半一日奮然犯荆棘冒鋒刃直歸故鄉以求母所在邑士大夫咸義君作詩文以壯其行過余取别嗟乎君之志固佳矣而君之行似未然也夫人生天地間為人子者孰不願立功名以顯揚其親為人父者孰不欲以功名顯揚期其子故為子者樂於逺遊為親者往往亦喜其子能逺遊而無離憂也余年二十三四時已上下四方將以遂為子之願副親之期何圖志未遂而吾母早世禄將及而先君子復溘然上征今余年六十有四矣每一念之至今枕席間淚痕如新夫以君之才之志過余逺矣閒關厯落垂十五年尚不克遂而墮此逆境宜乎思親之不置也宜乎欲捐生犯難以求其親也雖然余知君兄弟存者五人二兄仕于外餘二人者尚存母膝下矧太夫人夀登七十既夀其人必將福其身又烏知君兄弟不奉母獨存乎母獨存而君犯難以往脱有不虞以重貽母憂是得為孝乎孟子曰天將降大任於是人也必先苦其心志餓其體膚行拂亂其所為所以動心忍性增益其所不能今天將降大任於君如此君獨不能少為母忍須臾俟道稍通即翩然歸故鄉衣綵衣升堂拜母奉巵酒以為夀夫然後立功名以顯其親致孝養以盡為子之道庸非孝之大者乎余哀君之志冩予之情敘諸行卷之首君請擇於斯二者常氏雲齋詩序齋以雲名寓志也雲可以名齋乎夫雲之為物也氤氲磅礴觸石飛空或翼丹鳳而迎朝陽或從蒼龍而雨天下或無心而出岫或逐風而度溪千變萬化乍卷乍舒散之則漫不可收斂之則退藏於密雲之情態不幾於有道者乎自古高人逸士往往以雲自况往年余築道院於吾雞山之陽顔曰浮雲時揭翰林虞奎章歐陽承㫖許左轄各為詩文以華之今復見常氏雲卿以雲名其齋是能與雲同心與予同志也雲卿世居晉寧之潞州青年時隨其先人仕於臨川因家焉至正八年夏五月其子誠試吏於臨江迎以就養雲卿嘗於所居建小齋列圖書植花竹以為逸老投閒之所今翰林雪坡周君為書二大字揭其楣郡大夫士咸作詩頌其美其子誠從予遊求予為序予嘗觀雲卿之為人隨時頫仰與道隆汚汪洋遊乎𤣥間飄飄乎隨其所止超然自得有道存焉其或出或處不幾與雲似乎予欲諗雲卿曰子既與雲似不知子將為翼丹鳳迎朝陽之雲乎將為從蒼龍雨天下之雲乎抑將為無心出岫之雲乎雲卿謝曰若夫翼丹鳳從蒼龍吾老矣無能為矣將屬之浮雲而吾之雲無心出岫矣故以雲名其齋其誰曰不可送郡史况有容之肇慶士生天地間不患無位患無其志耳夫志猶水也苟其所向雖周折齟齬終亦必達夫子曰吾十有五而志於學孟子曰尚志古人亦曰有志者事竟成是亦善觀人者不觀其所處之崇卑但觀其志何如耳故予於鄉里客京師有自州郡吏位中書登閫帥為部侍郎者果有異於人哉但其志有不可企者爾方其為州郡時其立已與人異持身若冰雪行事如日星故德望日榮聲譽日起横槊捷出摶風九萬駸駸直上自有不可遏者由其志之所尚考其位之所稱非幸也宜也今生青年如晝蚤受知太守既能有志夫三子者之志異時成就又何患不若三子者哉兹因生之行嘉子之志故序其概為生勉生尚勗之端之幕府多吾故人必能為生刮目送府推鄭君仁化令尹序世俗嘗以吾儒者為迂濶甚而相與目笑之曰是腐也常敗乃公事是果迂濶與腐耶又烏得謂之儒哉此必盜儒之名而實有不稱者果儒者耶必不至迂濶况腐乎至正六年春予由秘書調長雄幕暇日因從吾故人袁君敬存問嶠南人情風土與當時同寅之賢者敬存喜相謂曰他則吾不知若推府鄭君練達而不迂剛介而不腐賢而有文君是行得友矣明年春三月予到官與太守岳侯推府鄭君相見私竊自喜敬存之不我欺也公餘相過因論上下得失臧否真可厯厯為予言極有理趣予間發一二往往與君意合由是遂定友焉君天資高機警多智一語不妄發一字不苟作太守當事不能决輒詣君即剖决如流迎刃而解而謂迂濶者能之乎吾聞之弱冠時鄉之衣冠遺老若陳蘧覺呉東園皆文章勍敵君錚錚獨往當其先鋒輒與抗頃刻百韻立就二老竒之其後以學古入官敭厯郡縣所至有能聲遺愛謂之腐與迂可乎今年春省臺大臣聞君賢調君為仁化尹仁化之民亦何幸歟將之官咸依依不忍别去於是酌酒重告鄭君曰固不得為腐矣然天既賦君以有為之資君又能力行其所學今聖天子求賢如不及圖治若饑渴之時獨不可一言悟主取封侯以行其志哉顧乃栖遲郡邑抱璞而不獻懷珠而不衒德澤及於一隅而不加於時聲名溢於海上而不聞於天下後世懷土以老不謂之迂不可也君黙然不能語遂握手一笑書以為送行序君號梅園南雄府判瑣達卿平寇詩序五嶺大庾其一也嶺之南九十里為南雄府治在焉羣山環揖兩江合流居民繁夥真壯郡也屬邑惟保昌始興負郭始興去城百二十里而逺僻在萬山間與韶之翁源贑之龍南信豐相接溪峒險惡草木茂密又與他郡不侔故其人為獠暴如虎狼至如㝷常百姓漸摩薰染亦復狼子野心不可以仁義化也邑民有劉害十者兄弟十餘人皆有膂力為寇十年官府亦莫敢誰何居民轉徙避亂無寧歲郡邑騷然官是郡者常病之至正二年某月曰賊率衆壯千人白晝鼓行入始興縣破囹圄出囚徒掠人財畜縣邑為墟宰官咸倉皇避走坐視莫為之計恣睢跋扈氣燄益張於是判府公惻然弗忍思民困於虎狼遂不避瘴癘不憚險阻親履行陣入清化洞破都坑直抵賊營羣賊戰敗鼠竄復進兵誅其妻孥羣盜遁去未即獲公命以計招降之從軍汪榮挈賊首劉害十等三十六人膝行拜營門請降始待以不死賊欣然詣郡郡上之州府府諭遣還留雄十餘日賊登城遍觀公謂所親曰吾向觀羊城特易與爾至如南雄真彈丸黑子之地可一蹴而平也破城之日吾當以某屬分若人某屬與若人其餘兄弟自居之既而謀泄判府公慨然曰此賊不死民終無寜日遂與諸郡公謀曰寇勍敵眼中未有能當之者毋失事以貽人憂公曰諸公無慮冦在吾目中矣慎毋多談衆議遂定先是賊嘗冦同邑人許貴華賊反誣為冦詣府陳詞許潛躡其後與賊鬬命卒縛之賊傷卒公奮怒即以鐵篍擊賊徒李任一等驚懼反走公復追至府門又格殺之梟諸道傍城中老幼咸歡呼稽首聲動天地公曰渠魁雖殱其兄弟黨與在始興者尚多不悉平之必為後患即令人夜半圍賊營出其不意平明因風縱火賊無所措盡棄營走於是乗勝逐北死者過半賊遂平而脇從者罔治民乃安堵如故嗚呼公操數尺之鐵手殺賊奴朝廷不知有調度之勞州縣不知有供給之苦不動聲色而措生民於磐石之安其功為何如耶今太守岳侯不没人善剡薦兩司以論公之功雄之士民咸作詩歌以頌公德予因厯序其事以俟夫觀民者察焉是所謂能弭一方之難者但恐禍不極則功不顯爾苟朝廷公論有在則當使公正笏横犀出鎮方面天下之為臣子者咸慕公所為將見四海之内盜息民安又豈一方一郡之福哉公世家官族練達慷慨有燕趙之風達卿其字云蒼厓序臨川太守楊侯友直以隸書名當時一日作蒼厓二大字贈吾友李君思泰里中人榮侯之惠因以蒼厓稱李君且屬予序其概予惟古人因物以取名因名以見德有是德而後有是名也夫厓之為狀勒巖峭削壁立千仞截乎其不可攀屹乎其不可拔凜乎其不可犯宋節度張公詠操行高潔風節峻絶巋與厓相高以蒼自名豈虚言哉李君之為人風骨峻峭骯髒辨博涉江湖遊京師日與朝士大夫相接其事親也孝其處已也廉其有所不平又能倡大義排紛解難而無所顧忌似有剛不吐柔不茹之意亦猶厓之自拔於羣山而獨異於山者侯以蒼厓名君其以古人期君為何如也古人豈易及哉然人之生稟隂陽之氣鍾山川之英初未嘗有間政當因名物以自強求實德以相副無愧乎厓無愧乎古人亦無愧於楊侯也思泰與予相友善予嘗為其家君記德林堂故得以重致吾意焉齊安河南三書院訓士約歲乙丑春予濫竽長院釋奠時祠祀頽圮顧瞻徬徨上請憲府捐俸倡修庀材鳩工撤新講屋春秋舍菜幸無廢事竊念二程夫子啟籥於濂溪而接統於洙泗紫陽夫子樹立穹碑巋然如魯靈光源析流疏灼灼明甚學者當勉循㫖要以為立身行己之本下學上達之階由尼山鄒嶧以遠遡唐虞如康莊直達可無他岐也謹揭數條于後一德行之宜崇也周禮師氏以三德敎國子一曰至德以為道本二曰敏德以為言本三曰孝德以知逆惡至德者誠意正心端本澄源之事敏德者強志力行崇德廣業之事孝德者尊祖愛親不㤀本始之事此先王之教所以精粗兩盡本末相資而不倚於一偏者也朱子曰聖人教人有定本五常也四勿也自昔聖賢敎人之法莫不以此多士勖諸一士習之宜端也自古周南之化先及江漢王仁所被其流風餘韻雖百世而遥猶能望古而興懷勿謂楚無風也多士一步一趨當以聖賢為法慎毋競佻達而薄檢繩尚浮華而賤悃愊則品行端而正學明矣一實學之宜重也何謂實學凡有資於經濟達於政事者是也夫士學以待用因待用而學而學又皆無用可謂知務乎古之學者三年而通一經此經一明推之不可勝用也昔左史倚相能讀八索九丘之書當時稱為賢輔今日豈乏異材學者不可不求實效也一文體之宜正也程夫子云立言之道不使知德者厭無德者惑孟氏亦云言近而指逺者善言也葢其言不近則衆人亦惑其㫖不逺則君子易厭此聖賢立言之法萬世操觚者所必宗焉者也試看論語孟子其言何等平易其意何等精深使人觀之顯然味之無極矣一㑹課之宜勤也以文㑹友原是聖賢成法爾輩隨便立會不拘人數宜遵白鹿洞教規恒以實心敦礪質疑問難相與開發心胸顯示黙規相與砥礪名節不矜不伐下拜昌言若無若有近思良友虞廷孔孟相授之益可想而知也求友輔仁亦在志士之自奮耳一浮偽之宜禁也國家設學造士欲求真才實能共理天下爾士子披青衿入黌宮以逺大自期周子曰士希賢賢希聖聖希天希天一事曠世不談即希聖希賢姑亦未論耳諸生且先希士士志於道不恥衣食之惡無恒産而有恒心自能愛養廉節砥礪末俗矣泰定三年丙寅歲陽月與層山丘民則鶚奉啓民則茂異賢表姪足下於名門託姻婭五十年令先大父竟無一日之雅名姓徒相聞每切慨歎今兹天幸乃得與足下相見于洪是未能講姻好於太平之時忽得敘情話於離亂之後其喜慰為何如也政圗綢繆遣孫子相即而足下己不辭而往矣又不能不令人悵然也子敬來首詢動履能言君之先廬完好如昔時而生意動盪有加於曩日一鄉之内無非熙皡之民雞犬桑麻足食足用然後知浩劫不能有加於盛福之人而塵世未始無桃源特命薄者未之遇耳殊切企慕庶慰懷思兹因子敬歸便奉此問起居即辰冬晴未閒千萬為吾道自重臨楮惓惓不具鶚奉啓惟實集卷二
