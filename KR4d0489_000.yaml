body:
  text: 惟實集别集類四元提要臣等謹案惟實集七卷附録一卷元劉鶚撰鶚字楚齊永豐人皇慶間以薦授揚州學録纍官江州總管江西行省參政守韶州以贛寇圍城力禦不支被執抗節死其事甚烈明初修元史失于採録不為立傳併佚其名近邵逺平作元史類編始為補入忠義傳然亦僅及其死節事其生平行履則已不可考矣集為其子遂述所編初名鷲溪文獻其稱惟實集者蓋本其祖訓以詩道貴實之語也鶚官翰林修撰與虞集歐陽元揭徯斯等遊所居浮雲書院諸人皆有題詠元為序其文集稱其詩六體皆善徯斯序亦謂其髙處在陶阮之間雖友朋推挹之詞例必稍過其量然今觀其集大都落落不羣無米鹽齷齪之氣可以想見其生平二人所許亦不盡出標榜也且鶚身捍封疆慷慨殉國千秋萬世精貫三光即其文稍不入格亦當以其人重之况體裁髙秀風骨清遒實有卓然可傳者乎外集二卷皆前人序記挽詩乃其裔孫于廷等所重輯今仍附之集末以補史傳之闕漏焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c511599f31585ea280caa8e6bed41c174e01673eb1adad8a86157ff199b4c8ac
