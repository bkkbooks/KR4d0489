body:
  text: 惟實集卷四元劉鶚撰五言古詩浮雲道院詩二十二首并引泰定丁卯豫自河南考滿歸於所居雞山之陽闢五畝園植花竹茶橘之屬築室三楹置圖書設枕簟以為讀書之所賓至則相與飲酒賦詩投壺雅歌以終日或焚香讀書登山臨水以自樂翛然物表直欲輕世而肆志焉因竊取吾夫子富貴於我如浮雲之語扁之曰浮雲道院嗚呼吾豈真外富貴薄功名果於忘世者哉誠以承祖父之訓讀聖人書所學何事衆人之所以為衆人要皆不可以不察苟此不力則凝冰焦火淵淪天飛人欲熾天理亡三綱淪九法斁命義之不知廉恥之道喪沈陷沒溺顛倒眩瞀此心不存斯有不能踐其形者矣孟子曰君子之所以異於人者以其存心也蓋必存心而後可以踐形必視富貴如浮雲而後可以存心風雩之詠歸鳶魚之飛躍簞瓢陋巷之無憂衣縕袍而不恥以至於風月無邊庭草交翠風輕雲淡花栁皆春其所以流動充滿極天人之樂者是皆有得於夫子之意在我重在物輕也僕竊慕而願學焉但有志向道而萍蹤靡定日涉風塵歧路興悲則栖栖者將何所底焉因創道院為藏修之所朝夕於斯惕焉知懼庶幾乎薰陶漸染歲改月化冀有以窺聖賢之萬一使不至離道之逺為名教之罪人幸也且崎嶇更嘗之餘人情世故末理薄俗翻雲覆雨其可歌可感可驚可痛者傾耳洞目世味固以淡然矧旦暮見聞事又何限於是浮雲之思愈深矣因成數語以寫豫懷讀書冀聞道何必競榮名主賓辨內外物我孰重輕崎嶇更嘗餘愈覺兹理明浮雲視富貴悠然悟深情青山五畝園隨意茒三間竹樹發佳趣好鳥鳴關關物情固自樂聊得開我顔長歌答天風以永今夕閒胸次寡塵慮隨寓皆可樂孰云柴桑里不似麒麟閣雨餘草初生風定花自落榮辱今兩忘遺經在牛角廣譽薄文繡美德賢膏梁信道苟不篤不幾兹言狂春風散天和宇宙森衆芳盛德固莫及千載遙相望生人以御物何事隨物化五色雙目盲昏昏旦為夜髙處忽眼新令我重悲詫為塞陷天流雲開見嵩華留心强為善萬事當聽天天定還勝人何須苦煩煎原憲竟得貧顔子不假年在彼不我知在我當勉旃有客逺方來訪我衡門下豈無一樽酒樂此芳時暇好風吹晚花緑醑粘盞斝痛飲君莫辭流水易衰謝春來農事及雨過田水滿呼童具犁鋤耕作趁春暖但願黍稷稔客至得相款此外復何求讀書識吾短失之要本無既得乃固有但知貧為常未知賤者醜貧賤與得失命矣果誰咎萬態森前陳凝然袖吾手舞雩詠春風步履傍花栁此景信可樂胡為疾其首陶然天壤間萬事皆我友惟應甕頭春不知今熟否靜夜坐百態曉起俱不然奈何不自悟擾擾欲勝天效顰冀見好反以醜取捐勞心苟無益何如信吾緣權門手可熱行路為低頭一朝滄桑翻言之使人羞伉儷不能庇骨肉爛莫收悠然茅屋間老矣歸山丘田園兒女計為慮靡不周汲汲牛馬走辛苦悲白頭朱門有餓莩白屋生公侯是其稟氣初窮達非人謀象箸與玉杯其流至亡國簞瓢陋巷間千載有遺德采采陌上花豈無好顔色終然易零落歲晚愧松柏孟氏有三樂其一無愧心俯仰苟無愧至樂不可任萬化不得羈超然衆芳林神仙甚非遠何必海上尋知恥斯不辱知足常有餘豈無負郭田亦有堆牀書春風茶新苗雨過還當鋤准擬讀書暇茗飲甘如酥古人亦有言千橘萬户侯思之亦爛熟有志今甫酬金丸炫落日清霜滿林秋户侯詎能擬聊得供杖頭骨肉半零落有弟差慰意日暮田園歸濁酒聊共醉此酒可再得此日寧再世人間樂固多塤篪有真趣春風日已和桑麻藹新緑但可了寒暑生理亦自足沈浮閭里間我亦甘碌碌俯仰三百年蒼然此喬木常憐世間人晚歲生恐怖問之此何因牽以物欲故孰知不得將此理當自悟雲散月滿懷清風湛歸路東坡百世師其學常近禪雖墮斥逐中不作戚戚憐兩賦耀赤壁尚此風泠然我夢從之遊夢覺月滿天常愛陶潛翁獨歸田園居采菊東籬間酌酒南山隅有琴更無絃隨意良自如髙風千載間太息誰其徒擬古七首萬頃日二升千間夜六尺所用能幾何何苦悴心力牙籌與鞭算役役夜繼日百年俱蒼苔徒資後人惜疏食以當肉緩步以當車兹言深服膺既穩仍且腴鄙哉彈鋏君惓惓志魚輿古人甚能言適與吾心如是心亦猶人我豈悲富貴極知得有命常恐墜不義才薄未易稱去來矧難繫何如田南山食力差少愧東鄰有處女灼灼桃李神娉婷不肯嫁愛此天地身惟恐失所托悔恨難自陳踟蹰悄無言日照空閨春荆山一片玉秀氣鍾鴻濛幽暉不自衒老雨蒼苔封紛紛他山石舉世多拙工卞和今豈無至寶寧終窮京城海子上有僧持雙鈴誦經二十載寒暑白髮生辛勤積涓埃佛閣開明熒吾心若更苦天地何冥冥溝斷躋犧樽騏驥困鹽車時乎將奈何今古誰賢愚北風號枯梢落日明寒蕪未遇非所惜但恐流年徂寄黃州舊友四首後會未有期豈意歲云變不知百年間正復能幾見江湖北風多水濶鴈無便此心劇悠悠庭樹空倚遍客來為余言眠食兩無恙殊鄉吉語傳慰我心怏怏我峩棲霞樓仙人在其上甚欲往從之烟水互莽蒼舊書不忍讀讀之耿懷悲君子不共賞逺在天一涯喜聞甘棠陰雨餘緑差差冰玉晚自守素志正相期雪霰日已集感此寒夜長浮雲翳白日殺氣時飛揚落葉鳴聲悲遊子思故鄉去住不自料白雲杳茫茫秋來河水清秋來河水清春來河水渾水性有二致維時有涼暄與時相推移物態誰具論夷險不易節永言此心存雲松巢英英山上雲鬱鬱澗底松髙人抱奇姿適與雲松同雲不霖雨施松不棟梁為歸巢雲松間君元愧明時題集賢全大學士三首髙齊坐深夜幽事亦可悅恨無千黃金夜夜買明月買之匪有他憐月有圓缺願言月長圓不照人離别仲舒不窺園我懶輒破戒窮冬萬木枮菜葉青可愛羊肉豈不佳何如淡交耐苟能食其根黃河看如帶虛窗對風雨因得觀物妙君看四檐集不了一罅漏滄溟濶如天尾閭小如竇萬事當防微悠然發孤笑寄弟肖庭二首親喪尚土淺遊子懷帝鄉每逢時節臨重我涕泗滂有弟幸可托惟兄實無良中謀卜葬地未審君否臧我言兹山佳氣聚風斯藏山川重盤礴形勢森開張翻翻龍蛇集蔚蔚鸞鳳翔東西極完密前後分低昂明堂可萬馬懷抱包洪荒縱未增福慶亦可免禍殃似堪妥親靈此外俱荒唐進取貴果決築舍譏道傍堯時只一夔竟克成大章緬懷父母恩罔極齊圓方願言罄所積早得歸山岡惟君當送終而我遂顯揚出處各盡道庶可紓恐惶兩年幾寄書報章杳茫茫北風重寄此握筆情感傷蟋蟀鳴我宇流月照我帷我豈鐡石心寧能不懷歸種茶南山園秋雨苗應肥不審木子樹旱暵今稠稀惟應所樹棘歲久還成籬中煩種橘枳及時好為之此事倘未遂今歲勿更遲常嗟樹如此急景風飄吹不比王母桃動作千歲期庶幾菟裘成晚歲相娛嬉連牀遂所願聽雨忘心悲君看京城中緇塵化人衣百計慮已熟食力無瑕疵我言甚迂濶君亦當三思更煩語兒妷著意過庭詩南城書懷新麥緑如韭嫩栁含青烟東風不私物賦與無媸妍天地妙化育至理昭魚鳶願言春服成我亦沂水邊菽水堂菽水本淡泊母心常自安益知為養易獨覺盡歡難孝子情何極為儒味每酸佇看三釜養紫誥寫金鸞題淵泉二首流泉何涓涓淵水深更靜靜影涵太虛天光發輝映積之非一朝充溢若天性懷哉聖學功君應日涵泳其出源無窮其積常有餘不比溝澮雨盈涸惟須臾幽深不可測下有神龍居持之作霖雨以應當時需題朝陽齊曈曈扶桑日流光射簷楹晨起披我衣旦氣何其清萬慮自澄湛油然善心萌願學古聖人孜孜待雞鳴獨酌三首聊持一尊酒獨對西山酌我飲本不多借此以娛樂慨彼山中人豈無合仙藥月出烟蘿深思之在冥漠獨酌花樹下花影落酒中舉杯試一吸酒盡影亦空引壺遂再酌花影重玲瓏乃知酒有盡惟影原無窮木葉不飲酒胡為赬其顔我髮不耐秋微霜㸃其間葉赬春更緑髮白何由還人生不似葉何為空間關且可信所遇呼酒看西山題劉養直南山書院三首結屋南山下貯書書屋中願將貽子孫百歲相終窮萬事罕成算人生等飛蓬漸與桑梓逺而與梅花同永言作湯沐說夢時相逢種魚亦有池藝蔬亦有圃胡為輕棄之遽忍去鄉故人情薄如雲時政猛於虎可憐伏臘供粗足了官府終然不能忘時復懷故土故土尚可懷孤雲繞墳墓胸中飽藏書隨地皆可屋適意即為好何必重鄉曲嶺南多梅花亦足慰幽獨既免懷土譏喬遷豈非福異時須昌劉從君著芳族題東城和尚舊所贈卷後九年前長南雄幕重修帝師殿殿成命東城主之庚寅奉旨徴余翰林修撰東城求一言為别遂書此卷戊戌持節重來師漸老出舊卷重求余題因有所感故為書古詩以答舊題墨如新重㑹俄九載俯仰異今昔令我重悲慨上人漸老大未覺顔色改富貴多危機山中福如海趙貞常以善斫琴遇知琴成奏之稱㫖題其琴曰天厯正音國子監藍信之徵豫言二首唐虞不可作大雅何寥寥居然正始音洋溢天厯朝一鼓聲氣和再鼓陰陽調令我樂忘味倣佛齊聞韶嶧陽多孤桐因得備采樵願言聖明世勿棄爨下焦禮樂垂百年聖主乃當御奎章五雲間人文日宣著子猶師摯始風比關雎世猗歟聖人心借此發天趣麟鳳不在藪甘露降庭樹大地皆薰風寧獨子琴遇題談命楊見心陰陽無端倪大化不少息葉落已復萌泉枯又還溢虛盈消長機今古豈終極既見天地心禍福從測識何須泛天河眷眷支機石請君勿繫驢請君勿繫驢驢劣傷我樹樹死不足悲所悲種樹苦矧兹初夏臨清陰緑如雨亦解招涼吹為我滌炎暑願言共愛惜相與保遲暮大通驛阻風秋晚方北征朔風撼平地差遲百計非留滯豈天意十日九不前半月始千里功名要多艱正患得之易少折輕疾心進德良在是遣興二首萬事勿介意時來即為之幽蘭豈無芳不與春風期大化亦已定慎保冰雪姿笑歌栁陰中劒光白差差秋氣日已肅稍覺庭樹變江湖子非魚風雨客如燕桓桓六尺軀漂母寄一硯伯牙莫我顧遂也羞自薦常悲楚卞氏則足固求衒巢由古之人懷哉不可見坐久開我門江波白如練度狼山狼山出髙迥風急過如箭凄凄挾沙礫點點塵吹面我馬却復前努力與風戰寒日淡如月濕雨滿郊甸皮裘半為冰稍覺身體顫前村有人家酒熟亦堪薦關河老涉歷霜雪飽諳練文夫政如此何必懷破硯月夜中宵月娟娟睡起得孤快樹影在流水天地有真態灑然心鏡空如或飲沆瀣妙趣苟得之著意成蒂芥通大傳院使存初弓麓菴善書能詩伊誰白雲菴矯矯北山麓天書發光怪五色爛幽谷梅月照溪水霜雪見喬木窗虛自生白初起待朝旭慨彼菴中人奇姿美如玉學道存初心忘情淡無欲文章發天籟氣節動坤軸親承紫皇詔來往監玉局一卷黃庭經暇日應爛熟種栁造化無停機歲月甚行路種栁不滿年清陰已當户柔條亦可人隨風為余舞即景殊愴然因悲樹如此偶題客言不可信可信惟至理惟理苟可行不可即中止倘或徇客言事變無定體問客謝不知積謗俱在已尚觀理若何勿為客所使題詩置座右聊識吾過爾舟次蘇渡南望諸山怪狀謾成羣山多不毛怪石忽湧出土壤剝落盡恍惚見山骨端方俄如屏秀聳忽如笏或員如覆釜或鋭如頓筆千奇與萬怪欲寫難備述誰意寂寥中驚見此突兀雙闕髙倚雲令人恣超忽山中即事霧罷海日髙衣襟尚餘濕髙秋暖如春鳴禽忽相及草木罕黃落寒蟲不成蟄時於極熱中頗覺涼思集於此苟不察居然即成疾遊子思故鄉虛名空羈縶氣候何紛紛朝夕常岌岌何如下澤車飽飯老鄉邑次梅南劉先生韻江梅苦難滋草木偏易長美人不可期有約輒屢爽惟君礪操行如蚓食槁壤十年不相逢令我勞逺想疇昔夜夢君拄杖時敲門夢覺即買絲直將繡平原滄桑萬變餘俄然覩孤根重以契濶久頗覺顔色溫劇談到時事剴切多危言猗歟忠節邦驚見善類蕃今秋風雨多江水何翻翻風浪日夕湧清者亦復渾惟餘江邊梅髙標至今存感懷三首喪亂八九年乾坤日流血人心久不古倫義悉磨滅豺虎在城市生民半魚鱉張弓不得射令我重鳴咽欲付之忘言寧無愧司臬醉者常百千醒者才一二苟或不自持醒者亦復醉諸君願正大政好持善類庶幾綱目張或可起憔悴政事如修明盜賊亦人爾無令賈長沙痛哭至流淚喪亂靡有定天下無全材苟不事淫酗輒復多疑猜徒知尚權勢不恤治體乖生民化盜賊田里多蒿萊狂瀾亦既倒縱挽不可回願忍賈生淚且進淵明杯早發湴湖驛行康銅鋪小雨不滑道好風吹我衣畏途得清涼實亦天念之念之匪有他七十方督師上憂國步艱下憫生民疲區區當努力早見平淮碑寄蒙君禮元帥並書蒙泉二大字以貽之清泉出深山初若甚蒙昧書夜不往流日積漸充大滔滔忽成川滚滚直到海非比溝澮盈其涸可立待一朝隨蒼龍化作霖雨霈萬物俱沾濡初不分內外賦詩重期君竒勳著昭代感時世變日已深人心不如古狐狸向人號鰍鱔為誰舞承恩喜則人怫意怒還虎白日當交衢殺人莫知禦官府不敢問曲意盡摩撫生者半逃移死者空塵土禮法徒有名生民已無主矧今居官人冰炭生肺腑中心為私室藉口誇公舉何意慕藺亷當面成漢楚事功無由成喪亂遽如雨上天亦何怒生民亦何苦紅日將西沈悲歌望伊吕齒落去年落一牙今年落三齒動者日已落存者能有幾齒落何足悲所悲歲月逝行年已七十德業無可紀逺愧趙充國成名向邊鄙作圖上方略雖老何亹亹豈獨誇當時餘光耀青史我今往韶雄事勢焉能已漢賊不兩立直欲洗國恥梅關一嶺隔調度亦易爾會當殺賊奴持以報天子何妨衣繡衣持節老鄉里題韶州圖貂蟬一何髙武溪一何深可憐畫師筆寫余故鄉心故鄉有何好桑梓髙成陰童時所釣遊至樂不復尋重念松與楸斧斤日相侵莊舄豈不顯懷土仍越吟遊魚戀故淵栖鳥戀舊林微物尚且爾况被冠與簪余年已七十持節滄海潯南北欲斷絶世道多崎􅋂田園謾入夢魚鴈亦已沈縱使鐵石腸寧能不沾襟劫運會已極天道當禍淫願言輔吾志此賊真成擒浩歌返雞山理我無絃琴人心如春天人心如春天變態不常一紛紛乍飛雨杲杲俄出日解衣遽生寒添衣又還熱寒熱既不時命我重致疾人心固難知春天亦叵測萬事當自防底用長歎息送鄺將軍元帥還郴古詩十首桓桓鄺將軍討賊奮英武所至縛賊奴將以血覺鼓淮陰信無雙噲等焉足伍年富力正强成功報明主桓桓鄺將軍賦性機甚警沈毅罕言語每發中肯綮及其聞善言沛然發深省酷吏盡掃除疲民得蘇醒桓桓鄺將軍憂國常戚戚韶民苦凋瘵軍賦從何出慨然示無私政令始歸一倉庫豈不盈稽之不終日桓桓鄺將軍苦天久不雨青黃不相續斯民亦良苦忠誠自心出䖍禱遽如許神靈亦陰相青天雨如澍桓桓鄺將軍擬歸集精兵涼秋八九月佇看官陂平其餘持土苴不戰將自傾與子當並驅笑􅐁南雄城桓桓鄺將軍號令甚嚴肅荒村人夜行空谷鬼書哭風霆無留滯迅若置郵速昨日歸牽牛推恩及茅屋桓桓鄺將軍仗義能急難水陸勢既合破賊笑談間聲名播南海威武耀北蠻明當喚班固勒名貂蟬山桓桓鄺將軍罕與汙冗親所以奸諛夫無所容其身况耳不妄聽中心明如神誰知殺賊漢髙出知書人桓桓鄺將軍密爾宜章市公然一榻外老賊敢鼾睡一朝生致之持歸獻天子天子嘉其功聲名播寰宇桓桓鄺將軍民社當自重但願賊掃除勿遣民倥偬居民苟一空城存復何用此理君固知丁寧為君誦滑石徑盛暑逺行役既老尤難堪矧兹滑石徑亂石何崇巉上有千丈崖下有百尺潭於焉苟失腳下飽饑蛟饞况余髮盡白齒落餘二三胡為逺行役攬轡衝瘴嵐為懷聖主恩優渥如雲曇臨難重却避臣子寧無慚平生志許國何敢辭苦甘烏知有險阻快若乘風帆督師急討賊醜類俱除芟持以謝明主拂袖還江南家叔西隱結亭顔曰暖翠賦詩見寄次韻寄亭上白髮逢盛世昕夕鳳翔翺青山讀舊書燈火雙目蒿間從淡泊餘世與鴻蒙遭此意自有得此心不知勞不為溟渤鯤不作井裏螬孤亭撫萬竹無愧五栁陶試詢紫羅裳曷若粗布袍暖翠滴衣袂朱顔如春桃清風颯相遇鬚鬢何蕭騷阿咸老京國俯仰隨官曹富貴多危機平地生波濤回頭眄兹亭孰謂雲臺髙秋江送别知己别已難木落秋正暮明朝孤船開苔生别時路歸看庾嶺梅已覺花盈樹回看章水雲馳情重含楚題彭氏月池二首髙人散幽懷獨愛池水淨明月俄飛來池光漸如鏡中有驪龍珠紛紛白光映靜影涵太虛悠悠見天性好斫月中桂莫種池上松為諗結繁陰虛白生朦朧回波忽成絃淡淡來天風光彩更流麗感此多新功題黃德明所藏山居圖茒屋依密樹彎溪駕長橋山光逺泛泛野興寒蕭蕭寡合人所忌幽居誰見招撫時塵滿眼亦欲從漁樵題琴隱抱琴將何之駕言歸山陰南風苦難招逃虛豈初心鍾期固可鑄但恨無黃金惟應澗中泉知余為和音淵明漉酒巾脫我頭上巾漉此壺中酒糟粕既已無渣滓復何有陶然見天真長風起髙栁聽琴圖山水有天趣寫向膝上琴聽者不少違獨覺用意深古今那可期令我重愧今審音諒匪難所貴相知心戲題嬰兒圖大兒初脫懷小兒猶戀乳凱風棘成薪母氏亦良苦人生襁褓中焉識母如此兹圖用情深人應盡為子題贑太守文山與曾通判崖山追劄子後古人重友誼不計官崇卑况以桑梓親謙厚浮情辭節物重稠疉翰墨光淋漓不諂亦不瀆二老真吾師題詩語薄俗勿以富貴移采蓮女采蓮本貧女出身甚寒薇為因妙歌舞遍體蒙珠璣覩此忽有感中夜常三思士當患無實不患無人知聞鄰哭有感母哭其子長婦哭其夫短子魂不可招空使母腸斷母淚似海水海水亦有岸人間為母心懷哉淚瀰旦遊南華山過此不可來來遊必須遍山色青可掬溪水甘可薦低頭拜祖師妙音滿唐殿云何八百年生色尚在面三生信有緣世亂能一見一見了即休敢作桑下戀别師出山門山雲白如練述懷馬無千里姿伯樂固時有琴無山水音鍾期未嘗朽落落不自強敢怨賈不售從今當閉門內省原無疚珠玉倘有在山川自眀秀遁世莫我知我亦甘白首四皓漢祖事嫚罵恥以長䇿干生平義不辱逺隱商山間軒冕多險巇衣冠自髙閒芝草甘且腴白髮明蒼顔超然髙物表於世了不關一朝詣闕下漢室安如山信有大力量談笑回强瀾始知老英雄未易淺近觀藏器固有待時至功無難往往渭水濱托興事釣竿過龍門龍門鬱嵯峨巖壑幽更深雲氣擁石壁雷雨懸太陰逺遊得勝槩良足寫我心無人鞭長蛟為豫一長吟南城門外書所見二首青松夾前道白楊蔭崇垣鮮鮮石麒麟不知誰家墳有客行且歌歌罷向我言為言墳中人生時乘華軒粉黛左右侍車馬前後奔乘時不飲酒今日空成塵我行荒林翳道傍卧豐碑平生頗好古下馬細讀之盧龍劉節度生當大唐時杖䇿奮威武勳業開邊陲人無百年身既盛還當衰植此頌功德亦有千年期埋沒蔓草間赫赫誰復知往者已可歎來者更可悲題劉翀霄五世圖昔聞康節翁慈母八十餘階前小稚子歡笑娛相呼甘㫖足豐儉自謂此樂無今君祖母秦九十康强俱牙齒盡完好起居不資扶鮮鮮芙蓉裳皎皎明月裾綵輿親迎養獨覺愛日舒有兒俱白顛有孫亦銀鬚曾𤣥繞膝下日向庭闈趨一門極孝友五世咸怡愈矧君自奇士振䇿當要途風雲接平步日月明亨衢覃恩追考妣盛事誇里閭苟非母厚德此福寧獨居恨無漢史筆逐一為母書嗟豫辱同姓感念成長吁祖年百又一孫子紛如圭深衣晝錦緣曾繪家慶圖壽康世莫比好事傳京都翰林歐蘇輩詩頌焉可誣及今甫七載往事浮雲徂我恨豈有極君樂當何如題詩卷還君悠然淚盈袪題淵明圖雨過林壑靜寒禽變幽響稚子操一瓢良辰逐孤往微吹驚帽紗落日在鶴氅無營神自充有道心更廣籬菊雖未花隨意得真賞豈誠嗜杯酒借此陶所養先生真吾師開卷慰遐想鄙哉粘壁蛄白髮心怏怏夜宿何家寨寨中止魏于二姓為婚姻驅馬涉深澗山徑極深窈蜂房比老屋矗矗寄林藪頗辭塵俗喧迥出烟霞杪逡巡問主人住此安樂否主人向我言兩姓世相守輩輩為婚姻已是百年久開羣自牛羊忘歸任雞狗怡然古人風此事出意表須臾羅酒漿兒女忽環繞殷勤勸我飲殊覺禮數厚自辭酒味薄將意不堪口聊得慰寂寞且用息奔走蘧廬止一宿漂泊等飛鳥愁多不成寐庭樹雞戒曉天明趨長途失笑愧林叟髙僉事招飲於城西門燕山亭步出城西門晴日光離離不知春淺深緑葉含曉滋感兹時物變但恐毛髮衰徘徊燕山亭勝友相追隨鮮鮮棠梨花灼灼丁香蕤節序固已晚聊復折一枝緬懷古之人俯仰令心悲草𤣥良自苦獻璞寧非癡何如即時酒歌我浮雲詩漁人發清響逺過竹與絲風吹羅衣裳為子舞僛僛微酣劇談笑倒景已莫追為樂慎勿極苟無負良時木槎徑我行木槎徑樹木髙蔽天徑幽欲無路樹老不記年盛夏霜霰集白晝雷雨懸頭礙卑樹枝足踏深澗泉仰看咫尺間半日不得前方兹汗如雨陡覺風凄然行人謬調攝疾病相纏綿况苦乏藥物病亦何由痊古人號瘴鄉於以待貶遷豫生果何為自愧亦自憐一官號持斧從者多控弦精神復矍鑠手足多胝胼據鞍氣愈壯報國心愈堅願言早平寇歸泛胥江船寄監憲亂鴉忽收聲羣鵲逐我屋俄傳報捷來渠魁已就戮生民久塗炭郡邑久陵谷道路少人行寃鬼白晝哭撫時亂已極在理往必復桓桓鄺將軍驍勇時所獨將軍固可嘉主憲多盛福上天既悔禍盜賊亦厭亂何况天下心亂極重思漢五羊號雄藩地列江右半魚鹽足富利戎馬素强悍憲君居是間九載屢克叛運籌多𤣥機臨事有成算聲名達宸聰美譽流汗漫西江望旌旗如望雨濟旱政宜揮千金談笑遣黥灌乘機搗豫章克復在夕旦笑提叛臣頭庾嶺作京觀千秋萬古間留得路人看勳業垂無窮人生如露電秋日即事我辭五羊來老氣凌雲浮意謂此孽醜端可一戰收秋初抵韶陽事有大不侔主將恣貪暴田里多怨愁軍馬晨星稀盜賊春雲稠倏圍響石寨窮迫已可憂又聞湖南陳圍困連桂州談侯棄南雄篤意歸舊丘牒報關外寇復有開韶謀民情堪恟恟儼如浪中舟乞師與請糧使者交庭陬蹇余持空拳無可應其求雖云百冗集烏足回其頭精神强奮迅隨意相應酬或誘以好爵或賚以銀甌或時糾民丁相豫執戈矛南北各有事惟幄聊運籌胸次日擾擾回首已仲秋連桂忽報捷殺賊如星流州城雖無恙民物日已偷皇天實相我幸不貽時羞所嗟響石寨竟為賊俘囚援兵既不利與賊空為讎桓桓蒙將軍忠義誰與儔討賊為已任誓滅賊乃休雍容風鳴樹便捷鷹脫韝臨事每千慮為慮靡不周聚糧輒充棟饗士時椎牛意氣益傾倒士樂從之遊於時賴有此長笑看吳鈎枕上偶成欹枕聞晨雞似覺微陽動吹燈起靜坐聊得醒醉夢神仙似可學惟在製鉛汞精神一相交龍虎自迎送周流如轉輪迅捷等飛鞚或疑雲霧蒸又若春泉湧舌本甜如飴逺過甘露甕天根與月窟春意滿空洞始信中庸書中實多妙用蹇余迫衰暮王事何倥偬有息當自調有心苦未統歸理藍田雲相期玉堪種留侯惜已逺此約誰與共何年揖浮丘丹霄駕飛鳳官軍破蘇村惡其與賊通賊兵破白沙惡民之不相隨蒼生果何辜十載墮塗炭天心不可知令我重悲惋自從喪亂來盜賊苦搆患有田不能耕有園不能灌牛羊被虜掠妻子各分散窮冬尚無衣日午猶未飯官府不我恤沈浮等鷗鴈脅從姑偷生縱死冀少緩昨夜官軍來又復誅反叛粗豪甚豺狼猛毒如狴犴一槩盡殺掠去賊才一間玉石俱不分生民重糜爛縱賊官府嗔為民賊雜亂左右將安歸泛若無畔岸新春雨瀟瀟何忍聽悲歎願言忍須臾維持夜將旦惟實集卷四
